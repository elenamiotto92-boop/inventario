<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">

    <title>Inventario Pizzerie</title>
    <style>
        :root { 
            --red: #ff4d4d; --green: #4caf50; --gold: #f39c12; --dark: #2c3e50;
            --cat-pasta: #cbd5e0; --cat-vaschette: #a8d08d; --cat-formaggi: #ffff00;
            --cat-salumi: #ed7d31; --cat-scaffaleria: #d9d9d9; --cat-fresco: #92d050;
            --cat-pesce: #9bc2e6; --cat-condimenti: #e2efda; --cat-freezer: #5b9bd5;
            --cat-impasti: #c6e0b4; --cat-combustibile: #ffeb3b; --cat-monete: #f2f2f2;
            --cat-imballaggi: #fce4d6; --cat-detersivi: #ddebf7; --cat-vario: #fff2cc;
            --cat-crude: #f8f9fa;
        }
        body { font-family: -apple-system, sans-serif; background: #eef2f7; padding: 10px; margin: 0; padding-bottom: 180px; }
        
        .header-box { background: white; padding: 15px; border-radius: 12px; margin-bottom: 15px; box-shadow: 0 2px 5px rgba(0,0,0,0.1); border-top: 5px solid var(--gold); text-align: center; }
        
        select.pizzeria-select { width: 100%; padding: 12px; border-radius: 8px; border: 2px solid var(--gold); font-size: 18px; font-weight: bold; background: #fffcf5; margin-top: 10px; color: var(--dark); }
        
        .search-container { margin-top: 10px; display: none; }
        .search-input { width: 100%; padding: 10px; border-radius: 8px; border: 1px solid #ccc; font-size: 16px; box-sizing: border-box; }

        .btn-reset { display: none; background: var(--red); color: white; border: none; padding: 8px 15px; border-radius: 8px; font-size: 0.8em; font-weight: bold; margin-top: 10px; width: 100%; cursor: pointer; }

        /* TABELLE RIEPILOGO */
        .riepilogo-biban, .tabella-globale { background: white; border-radius: 10px; border: 2px solid #ccc; margin-bottom: 20px; overflow: hidden; font-size: 0.85em; box-shadow: 0 2px 5px rgba(0,0,0,0.05); }
        .tabella-globale { border: 2px solid var(--dark); }
        
        table { width: 100%; border-collapse: collapse; table-layout: fixed; }
        th { background: #f2f2f2; padding: 10px 5px; text-align: center; border-bottom: 2px solid #ddd; }
        th:first-child { text-align: left; width: 40%; padding-left: 10px; }
        td { padding: 10px 5px; border-bottom: 1px solid #eee; text-align: center; vertical-align: middle; }
        td:first-child { text-align: left; font-weight: bold; padding-left: 10px; background: #fafafa; }

        /* Colore rosso per valori sotto soglia nella vista TUTTE */
        .sotto-soglia { color: var(--red); font-weight: bold; }

        .categoria-header { color: black; padding: 8px 12px; margin-top: 20px; border-radius: 8px 8px 0 0; font-size: 0.9em; font-weight: bold; text-transform: uppercase; text-align: center; border: 1px solid #999; }
        
        .item { background: white; padding: 10px 12px; display: flex; justify-content: space-between; align-items: center; border: 1px solid #ccc; border-top: none; position: relative; }
        .item:last-child { border-radius: 0 0 10px 10px; }
        
        .urgente { background: #ffcccc !important; border-left: 8px solid var(--red) !important; }
        .ok { background: #e2f0d9 !important; border-left: 8px solid var(--green) !important; }
        .vuoto { background: #fff9db !important; border-left: 8px solid var(--gold) !important; }
        .no-obbligo { background: white !important; border-left: 8px solid #ddd !important; }
        .errore-testo { background: #6c757d !important; border-left: 8px solid black !important; color: white !important; }
        
        .nome-ingrediente { font-weight: 500; color: #333; font-size: 0.9em; }
        .soglia-info { font-size: 0.65em; color: #888; }
        
        input.qty-input { width: 90px; height: 32px; border-radius: 4px; border: 1px solid #999; font-size: 14px; text-align: center; background: white; }
        
        .footer-controls { position: fixed; bottom: 0; left: 0; right: 0; background: white; padding: 15px 10px 25px 10px; box-shadow: 0 -5px 15px rgba(0,0,0,0.1); z-index: 1000; display: flex; flex-direction: column; gap: 10px; }
        
        .btn-wa { background: #25D366; color: white; border: none; padding: 15px; border-radius: 12px; font-size: 1.1em; font-weight: bold; cursor: pointer; flex: 1; }
        .btn-save { background: #3498db; color: white; border: none; padding: 15px; border-radius: 12px; font-size: 1.1em; font-weight: bold; cursor: pointer; flex: 1; }
    </style>
</head>

    function contieneNumeri(testo) { return /\d/.test(testo); }

    function estraiNumero(testo) {
        if (!testo) return NaN;
        testo = testo.toString().trim().replace(',', '.');
        if (/^\d+\/\d+$/.test(testo)) {
            const parti = testo.split('/');
            return parseFloat(parti[0]) / parseFloat(parti[1]);
        }
        const match = testo.match(/(\d+(\.\d+)?)/);
        return match ? parseFloat(match[0]) : NaN;
    }

    function generaVistaTutte() {
        const cont = document.getElementById('contenitore-lista');
        cont.innerHTML = "";
        
        const datiCasta = JSON.parse(localStorage.getItem('inventario_dati_CASTA')) || {};
        const datiSilea = JSON.parse(localStorage.getItem('inventario_dati_SILEA')) || {};
        const datiBiban = JSON.parse(localStorage.getItem('inventario_dati_BIBAN')) || {};

        let currentCat = "";
        let html = "";

        ingredienti.forEach((ing, i) => {
            const soglia = isWeekendDomani ? ing.we : ing.fer;

            // Funzione interna per colorare se sotto soglia
            const formattaValore = (valore, ingrediente) => {
                if (!valore || valore === "-") return "-";
                // Non coloriamo le verdure crude perché non hanno soglia
                if (ingrediente.noObbligo) return valore;
                
                const num = estraiNumero(valore);
                if (!isNaN(num) && num < soglia) {
                    return `<span class="sotto-soglia">${valore}</span>`;
                }
                return valore;
            };

            if(ing.cat !== currentCat) {
                if(currentCat !== "") html += `</tbody></table></div>`;
                html += `
                    <div class="categoria-header" style="background-color: ${ing.color}">${ing.cat}</div>
                    <div class="tabella-globale cat-group" data-cat="${ing.cat}">

                                    <th>Casta</th>
                                    <th>Silea</th>
                                    <th>Biban</th>
                                </tr>
                            </thead>
                            <tbody>`;
                currentCat = ing.cat;
            }

            html += `
                <tr class="ing-item" data-nome="${ing.nome.toLowerCase()}">
                    <td>${ing.nome}</td>
                    <td>${formattaValore(datiCasta[ing.nome], ing)}</td>
                    <td>${formattaValore(datiSilea[ing.nome], ing)}</td>
                    <td>${formattaValore(datiBiban[ing.nome], ing)}</td>
                </tr>`;
        });

        html += `</tbody></table></div>`;
        cont.innerHTML = html;
    }

                    <td>${datiSilea[ing.nome] || "-"}</td>
                    <td>${datiBiban[ing.nome] || "-"}</td>
                </tr>`;
        });

        html += `</tbody></table></div>`;
        divRiepilogo.innerHTML = html;
    }

    function creaLista() {
        const cont = document.getElementById('contenitore-lista');
        const pizzo = document.getElementById('pizzeria').value;
        const btnAzzera = document.getElementById('btn-azzera');
        const searchBox = document.getElementById('search-box');
        const footerBtns = document.getElementById('footer-btns');
        const riepilogoDiv = document.getElementById('riepilogo-globale');
        
        cont.innerHTML = ""; 
        riepilogoDiv.innerHTML = "";

        if (!pizzo) { 
            btnAzzera.style.display = "none"; 
            searchBox.style.display = "none"; 
            footerBtns.style.display = "none";
            return; 
        }
        
        searchBox.style.display = "block";

        if (pizzo === "TUTTE") {
            btnAzzera.style.display = "none";
            footerBtns.style.display = "none";
            generaVistaTutte();
            return;
        }

        btnAzzera.style.display = "block"; 
        footerBtns.style.display = "flex";

        if (pizzo === "BIBAN") {
            generaTabellaRiepilogoBiban();
        }

        let currentCat = "";
        const salvati = JSON.parse(localStorage.getItem('inventario_dati_' + pizzo)) || {};

        ingredienti.forEach((ing, i) => {
            let daMostrare = true;

            if (ing.cat === "FREEZER" && pizzo !== "BIBAN") daMostrare = false;
            if ((ing.nome === "Lievito" || ing.nome === "Canapa") && pizzo !== "BIBAN") daMostrare = false;
            if (ing.nome === "Sale" && pizzo === "SILEA") daMostrare = false;
            if (ing.nome === "Olio Fritte" && (pizzo === "SILEA" || pizzo === "BIBAN")) daMostrare = false;
            if (ing.nome === "Pel.Salsa" && (pizzo === "SILEA" || pizzo === "BIBAN")) daMostrare = false;
            
            if (ing.cat === "VERDURE CRUDE") {
                if (pizzo !== "CASTA" || !isDomenicaOggi) daMostrare = false;
            }

            if (daMostrare) {
                if(ing.cat !== currentCat) {
                    cont.innerHTML += `<div class="categoria-header" style="background-color: ${ing.color}">${ing.cat}</div>`;
                    currentCat = ing.cat;
                }
                const soglia = isWeekendDomani ? ing.we : ing.fer;
                const valorePrecedente = salvati[ing.nome] || "";
                const classeExtra = ing.noObbligo ? "no-obbligo" : (valorePrecedente === "" ? "vuoto" : "");
                
                cont.innerHTML += `
                    <div class="item ${classeExtra} ing-item" id="box-${i}" data-nome="${ing.nome.toLowerCase()}">
                        <div>
                            <div class="nome-ingrediente">${ing.nome}</div>
                            <div class="soglia-info">${ing.noObbligo ? '' : 'Min domani: ' + soglia}</div>
                        </div>
                        <div class="input-container">
                            <input type="text" class="qty-input" id="sel-${i}" placeholder="Qtà" value="${valorePrecedente}" oninput="valuta(${i}, ${soglia}, ${ing.noObbligo || false})">
                        </div>
                    </div>`;
                
                if(valorePrecedente !== "") valuta(i, soglia, ing.noObbligo || false);
            }
        });
    }

    function filtraLista() {
        const query = document.getElementById('searchInput').value.toLowerCase().trim();
        const items = document.querySelectorAll('.ing-item');
        const headers = document.querySelectorAll('.categoria-header');
        const tabelle = document.querySelectorAll('.cat-group');

        items.forEach(item => {
            const nome = item.getAttribute('data-nome');
            if (query === "barbazza") {
                item.style.display = listaBarbazza.includes(nome) ? (item.tagName === 'TR' ? 'table-row' : 'flex') : "none";
            } else {
                item.style.display = nome.includes(query) ? (item.tagName === 'TR' ? 'table-row' : 'flex') : "none";
            }
        });

        headers.forEach(h => {
            h.style.display = (query === "") ? "block" : "none";
        });
        
        tabelle.forEach(t => {
            t.style.display = (query === "") ? "block" : "none";
        });
    }

    function valuta(i, soglia, facoltativo) {
        const input = document.getElementById(`sel-${i}`);
        if(!input) return;
        const testo = input.value;
        const box = document.getElementById(`box-${i}`);

        if (testo.trim() === "") {
            box.className = facoltativo ? "item no-obbligo ing-item" : "item vuoto ing-item";
        } else if (!contieneNumeri(testo) && !facoltativo) {
            box.className = "item errore-testo ing-item";
        } else if (facoltativo) {
            box.className = "item no-obbligo ing-item";
        } else {
            const valore = estraiNumero(testo);
            box.className = (valore < soglia) ? "item urgente ing-item" : "item ok ing-item";
        }
    }

    function salvaDati() {
        const pizzo = document.getElementById('pizzeria').value;
        if (!pizzo || pizzo === "TUTTE") return;
        let datiDaSalvare = {};
        ingredienti.forEach((ing, i) => {
            const input = document.getElementById(`sel-${i}`);
            if (input) { datiDaSalvare[ing.nome] = input.value; }
        });
        localStorage.setItem('inventario_dati_' + pizzo, JSON.stringify(datiDaSalvare));
        localStorage.setItem('ultima_pizzeria', pizzo);
        alert("✅ Dati salvati correttamente per " + pizzo);
    }

    function azzeraLista() {
        if (confirm("⚠️ Vuoi davvero cancellare TUTTI i dati inseriti per questa pizzeria?")) {
            const pizzo = document.getElementById('pizzeria').value;
            if (pizzo && pizzo !== "TUTTE") localStorage.removeItem('inventario_dati_' + pizzo);
            document.getElementById('searchInput').value = "";
            creaLista();
        }
    }

    function cambiaPizzeria() {
        document.getElementById('searchInput').value = "";
        creaLista();
    }

    window.onload = function() {
        const ultimaPizzo = localStorage.getItem('ultima_pizzeria');
        if (ultimaPizzo) {
            document.getElementById('pizzeria').value = ultimaPizzo;
            creaLista();
        }
    }

    function inviaWhatsApp() {
        const pizzo = document.getElementById('pizzeria').value;
        if (!pizzo || pizzo === "TUTTE") return;
        let msg = `🏪 *INV. ${pizzo}* - PER ${nomiGiorni[domaniIdx].toUpperCase()}\n\n`;
        let trovatiMancanti = false;
        let listaVuoti = [];
        let listaErrori = [];
        let crudeMsg = "";

        ingredienti.forEach((ing, i) => {
            const input = document.getElementById(`sel-${i}`);
            if (!input) return; 
            const testo = input.value.trim();
            const soglia = isWeekendDomani ? ing.we : ing.fer;

            if (ing.noObbligo) {
                if (testo !== "" && isDomenicaOggi && pizzo === "CASTA") crudeMsg += `• ${ing.nome}: ${testo}\n`;
            } else {
                if (testo === "") {
                    listaVuoti.push(ing.nome);
                } else if (!contieneNumeri(testo)) {
                    listaErrori.push(ing.nome);
                } else {
                    const valore = estraiNumero(testo);
                    if (valore < soglia) {
                        msg += `• *${ing.nome}*: ${testo} (Soglia: ${soglia})\n`;
                        trovatiMancanti = true;
                    }
                }
            }
        });

        if (listaVuoti.length > 0) { alert("⚠️ COMPILA TUTTO! Mancano:\n- " + listaVuoti.join("\n- ")); return; }
        if (listaErrori.length > 0) { alert("⚠️ ERRORE! Devi inserire almeno un numero per:\n- " + listaErrori.join("\n- ")); return; }
        if (!trovatiMancanti) msg += "✅ Scorte OK!";
        if (crudeMsg !== "") msg += `\n🥗 *VERDURE CRUDE*:\n${crudeMsg}`;

        window.location.href = "whatsapp://send?text=" + encodeURIComponent(msg);
    }
</script>
</body>
