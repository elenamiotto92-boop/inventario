<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Inventario Pizzerie - Cloud Sync</title>
    <style>
        :root { 
            --primary: #6d4c41; 
            --secondary: #8d6e63; 
            --accent: #d7ccc8; 
            --background: #f5f5f2; 
            --white: #ffffff;
            --text: #3e2723;
            --red: #a30000;
            --green: #2e7d32;
            --gold: #bf360c;
        }

        body { 
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif; 
            background: var(--background); 
            color: var(--text);
            padding: 10px; 
            margin: 0; 
            padding-bottom: 180px; 
        }
        
        .header-box { 
            background: var(--white); 
            padding: 20px; 
            border-radius: 16px; 
            margin-bottom: 20px; 
            box-shadow: 0 4px 12px rgba(62, 39, 35, 0.1); 
            border-bottom: 4px solid var(--primary); 
            text-align: center; 
            max-width: 1400px; 
            margin-left: auto; 
            margin-right: auto; 
        }

        select.pizzeria-select, .date-input { 
            width: 100%; 
            padding: 14px; 
            border-radius: 10px; 
            border: 1px solid var(--accent); 
            font-size: 16px; 
            font-weight: 600; 
            background: #fafafa; 
            margin-top: 10px; 
            color: var(--primary); 
            box-sizing: border-box;
        }

        .date-picker-wrapper {
            position: relative;
            display: flex;
            align-items: center;
        }

        .date-picker-wrapper::after {
            content: "📅";
            position: absolute;
            right: 15px;
            pointer-events: none;
        }

        .search-input { 
            width: 100%; 
            padding: 12px; 
            border-radius: 10px; 
            border: 1px solid var(--accent); 
            font-size: 15px; 
            box-sizing: border-box;
            background: #fff;
        }

        #contenitore-lista { 
            display: grid; 
            grid-template-columns: 1fr; 
            gap: 15px; 
            max-width: 1400px; 
            margin: 0 auto; 
            align-items: start; 
        }

        @media (min-width: 768px) { #contenitore-lista { grid-template-columns: repeat(2, 1fr); } }
        @media (min-width: 1200px) { #contenitore-lista { grid-template-columns: repeat(3, 1fr); } }

        @media (min-width: 1024px) { 
            #contenitore-lista.vista-tabellare { 
                grid-template-columns: repeat(3, 1fr); 
            } 
        }

        .cat-group-container { 
            background: var(--white); 
            border-radius: 12px; 
            overflow: hidden; 
            border: 1px solid var(--accent); 
            box-shadow: 0 2px 6px rgba(0,0,0,0.05);
            margin-bottom: 10px;
        }

        .tabella-globale { width: 100%; font-size: 0.85em; }
        table { width: 100%; border-collapse: collapse; table-layout: fixed; }
        th { background: var(--accent); color: var(--primary); padding: 10px 5px; text-align: center; border-bottom: 2px solid var(--primary); }
        th:first-child { text-align: left; width: 40%; padding-left: 10px; }
        td { padding: 10px 5px; border-bottom: 1px solid #eee; text-align: center; vertical-align: middle; }
        td:first-child { text-align: left; font-weight: bold; padding-left: 10px; background: #fafafa; }

        .item { 
            background: var(--white); 
            padding: 12px 15px; 
            display: flex; 
            justify-content: space-between; 
            align-items: center; 
            border: 1px solid var(--accent); 
            border-radius: 12px; 
            min-height: 85px; 
            box-sizing: border-box; 
        }

        .nome-container { flex: 1; padding-right: 10px; }
        .nome-ingrediente { font-weight: 600; color: var(--text); font-size: 15px; line-height: 1.2; }

        .input-container { display: flex; align-items: center; justify-content: flex-end; }
        .input-wrapper { display: flex; flex-direction: column; gap: 4px; align-items: flex-end; }
        .sfuse-box { display: flex; align-items: center; gap: 5px; }
        
        input.qty-input { 
            width: 80px; 
            height: 36px; 
            border-radius: 8px; 
            border: 1px solid var(--accent); 
            font-size: 16px; 
            font-weight: bold;
            text-align: center; 
            background: #fff;
            color: var(--primary);
        }

        .urgente { border-left: 6px solid var(--red) !important; background: #fff5f5 !important; }
        .ok { border-left: 6px solid var(--green) !important; background: #f1f8e9 !important; }
        .vuoto { border-left: 6px solid var(--gold) !important; background: #fffde7 !important; }

        .footer-controls { 
            position: fixed; bottom: 0; left: 0; right: 0; 
            background: rgba(255, 255, 255, 0.95); 
            backdrop-filter: blur(10px);
            padding: 20px; 
            box-shadow: 0 -4px 20px rgba(0,0,0,0.1); 
            z-index: 1000; 
            display: flex; 
            flex-direction: row; 
            gap: 15px; 
            max-width: 1400px; 
            margin: 0 auto; 
            border-radius: 20px 20px 0 0; 
        }

        .btn-wa { background: #25D366; color: white; border: none; padding: 16px; border-radius: 12px; font-size: 16px; font-weight: bold; flex: 1.2; }
        .btn-save { background: var(--primary); color: white; border: none; padding: 16px; border-radius: 12px; font-size: 16px; font-weight: bold; flex: 1; }
        .btn-reset { background: var(--red); color: white; border: none; padding: 10px; border-radius: 8px; font-size: 12px; font-weight: bold; margin-top: 15px; width: 100%; }

        .categoria-header { background: var(--primary); color: white; padding: 12px; font-size: 14px; font-weight: 700; text-transform: uppercase; text-align: center; grid-column: 1 / -1; margin-top: 10px; border-radius: 8px; }
        .archivio-header { background: var(--primary); color: white; padding: 10px; border-radius: 8px; margin-bottom: 15px; font-weight: bold; text-align: center; grid-column: 1 / -1; }
        #sync-status { font-size: 10px; color: var(--secondary); margin-bottom: 5px; }
    </style>
</head>
<body>
    <div class="header-box">
        <div id="sync-status">☁️ Controllo Cloud...</div>
        <div id="info-giorno"></div>
        <select id="pizzeria" class="pizzeria-select" onchange="cambiaPizzeria()">
            <option value="">📍 SELEZIONA PIZZERIA</option>
            <option value="CASTA">CASTA</option>
            <option value="SILEA">SILEA</option>
            <option value="BIBAN">BIBAN</option>
            <option value="TUTTE">📊 TUTTE (VISUALIZZA)</option>
            <option value="ARCHIVIO">📜 ARCHIVIO STORICO</option>
        </select>
        
        <div id="search-box" style="margin-top: 10px; display: none;">
            <input type="text" id="searchInput" class="search-input" placeholder="🔍 Cerca ingrediente..." oninput="filtraLista()">
        </div>

        <div id="date-picker-container" style="display: none; margin-top:10px;">
            <div class="date-picker-wrapper">
                <input type="date" id="archiveDate" class="date-input" onchange="generaVistaArchivio()">
            </div>
        </div>
        
        <button id="btn-azzera" class="btn-reset" onclick="azzeraLista()" style="display:none;">🗑️ AZZERA LISTA ATTUALE</button>
    </div>

    <div id="contenitore-lista"></div>

    <div class="footer-controls" id="footer-btns" style="display:none;">
        <button class="btn-save" id="save-btn" onclick="salvaDati()">💾 SALVA</button>
        <button class="btn-wa" onclick="inviaWhatsApp()">📤 INVIA REPORT</button>
    </div>

<script>
    // --- CONFIGURAZIONE CLOUD ---
    const BIN_ID = '6a032c1ec0954111d81145d6'; 
    const API_KEY = '$2a$10$n74BprduBaxkWLZ72Jok.uusA4D.MrzIci5phXRfa71Kr5fsLBJQu';

    async function syncCloud(data = null) {
        const status = document.getElementById('sync-status');
        try {
            if (data) {
                status.innerText = '⏳ Sincronizzazione cloud...';
                await fetch(`https://api.jsonbin.io/v3/b/${BIN_ID}`, {
                    method: 'PUT',
                    headers: { 'Content-Type': 'application/json', 'X-Master-Key': API_KEY },
                    body: JSON.stringify(data)
                });
                status.innerText = '✅ Cloud Aggiornato';
            } else {
                status.innerText = '⏳ Caricamento dati...';
                const res = await fetch(`https://api.jsonbin.io/v3/b/${BIN_ID}/latest`, {
                    headers: { 'X-Master-Key': API_KEY }
                });
                const cloudData = await res.json();
                if(cloudData.record) {
                    Object.keys(cloudData.record).forEach(key => localStorage.setItem(key, cloudData.record[key]));
                    status.innerText = '✅ Dati Sincronizzati';
                    creaLista();
                }
            }
        } catch (e) { status.innerText = '❌ Errore Cloud'; console.error(e); }
    }

    window.onload = async function() {
        const uP = localStorage.getItem('ultima_pizzeria');
        if(uP) document.getElementById('pizzeria').value = uP;
        await syncCloud();
    };

    // --- LOGICA DATE E FESTIVI ---
    function getPasqua(anno) {
        const a = anno % 19, b = Math.floor(anno / 100), c = anno % 100,
              d = Math.floor(b / 4), e = b % 4, f = Math.floor((b + 8) / 25),
              g = Math.floor((b - f + 1) / 3), h = (19 * a + b - d - g + 15) % 30,
              i = Math.floor(c / 4), k = c % 4, l = (32 + 2 * e + 2 * i - h - k) % 7,
              m = Math.floor((a + 11 * h + 22 * l) / 451),
              mese = Math.floor((h + l - 7 * m + 114) / 31),
              giorno = ((h + l - 7 * m + 114) % 31) + 1;
        return new Date(anno, mese - 1, giorno);
    }

    function isFestivo(data) {
        const d = data.getDate(), m = data.getMonth() + 1, y = data.getFullYear();
        const p = getPasqua(y);
        const pasquetta = new Date(p); pasquetta.setDate(p.getDate() + 1);
        if (data.getDay() === 0) return true; 
        const festivi = [`1-1`, `6-1`, `25-4`, `1-5`, `2-6`, `15-8`, `1-11`, `8-12`, `25-12`, `26-12` ];
        if (festivi.includes(`${d}-${m}`)) return true;
        if (d === p.getDate() && m === (p.getMonth()+1)) return true; 
        if (d === pasquetta.getDate() && m === (pasquetta.getMonth()+1)) return true;
        return false;
    }

    const oraAttuale = new Date();
    const domani = new Date(oraAttuale); domani.setDate(oraAttuale.getDate() + 1);
    const oggiString = oraAttuale.toISOString().split('T')[0];
    const nomiGiorni = ["Domenica", "Lunedì", "Martedì", "Mercoledì", "Giovedì", "Venerdì", "Sabato"];
    const isWeekendDomani = isFestivo(domani);

    document.getElementById('info-giorno').innerHTML = `
        <div style="color: #3e2723; font-size: 1.1em;">Oggi: <b>${nomiGiorni[oraAttuale.getDay()]}</b></div>
        <div style="margin-top: 5px; font-size: 0.9em;">Inv. per domani: <b>${nomiGiorni[domani.getDay()]}</b> (${isWeekendDomani ? 'Festivo' : 'Feriale'})</div>
    `;

    // --- DATI COMPLETI ---
    const ingredienti = [
        { cat: "PASTA", nome: "Palline norm", fer: 150, we: 250 },
        { cat: "PASTA", nome: "Palline canapa", fer: 15, we: 30 },
        { cat: "PASTA", nome: "Mezzi", fer: 2, we: 10 },
        { cat: "VASCHETTE", nome: "Melanzane", fer: 1, we: 4 },
        { cat: "VASCHETTE", nome: "Zucchine", fer: 1, we: 4 },
        { cat: "VASCHETTE", nome: "Peperoni", fer: 1, we: 4 },
        { cat: "VASCHETTE", nome: "Funghi", fer: 1, we: 2 },
        { cat: "VASCHETTE", nome: "Salsa", fer: 1, we: 2 },
        { cat: "FORMAGGI", nome: "Mozza kg", fer: 15, we: 40 },
        { cat: "FORMAGGI", nome: "Bufala", fer: 5, we: 15 },
        { cat: "FORMAGGI", nome: "Provola", fer: 2, we: 5 },
        { cat: "FORMAGGI", nome: "Burrata", fer: 5, we: 10 },
        { cat: "SALUMI", nome: "Salsiccia", fer: 2, we: 10 },
        { cat: "SALUMI", nome: "Pancetta", fer: 0.5, we: 1 },
        { cat: "SALUMI", nome: "Salamino num", fer: 2, we: 5 },
        { cat: "SALUMI", nome: "Roastbeef", fer: 0.5, we: 1 },
        { cat: "SALUMI", nome: "P.cotto", fer: 1, we: 2 },
        { cat: "SCAFFALERIA", nome: "Uova", fer: 6, we: 12 },
        { cat: "FRESCO", nome: "Datterino", fer: 1, we: 2 },
        { cat: "FRESCO", nome: "Cipolla", fer: 1, we: 2 },
        { cat: "FRESCO", nome: "cass.Cipolla", fer: 0.25, we: 0.25 },
        { cat: "FREEZER", nome: "Fritte", fer: 2, we: 5 },
        { cat: "FREEZER", nome: "Forno", fer: 1, we: 3 },
        { cat: "MONETE", nome: "Rotoli 1 €", fer: 1, we: 1 },
        { cat: "MONETE", nome: "Banc. 5 €", fer: 150, we: 150 },
        { cat: "DETERSIVI", nome: "Detergente", fer: 1, we: 1 }
    ];

    // --- LOGICA VISTE ---
    function estraiNumeroIntelligente(t) {
        if (!t) return NaN;
        t = t.toString().toLowerCase().trim().replace(',', '.');
        try { return eval(t.replace(/(\d+)\/(\d+)/g, (m, n, d) => n/d)); } catch(e) { return parseFloat(t); }
    }

    function generaVistaTutte() {
        const cont = document.getElementById('contenitore-lista');
        cont.innerHTML = ""; cont.classList.add("vista-tabellare");
        const d = ["CASTA", "SILEA", "BIBAN"].map(p => JSON.parse(localStorage.getItem('inventario_dati_'+p)) || {});
        let html = ""; let currentCat = "";
        ingredienti.forEach(ing => {
            const soglia = isWeekendDomani ? ing.we : ing.fer;
            if(ing.cat !== currentCat) {
                if(currentCat !== "") html += `</tbody></table></div></div>`;
                html += `<div class="cat-group-container"><div class="categoria-header">${ing.cat}</div><div class="tabella-globale"><table><thead><tr><th>NOME</th><th>Casta</th><th>Silea</th><th>Biban</th></tr></thead><tbody>`;
                currentCat = ing.cat;
            }
            const vals = d.map(p => {
                const v = p[ing.nome] || "-";
                return (!isNaN(estraiNumeroIntelligente(v)) && estraiNumeroIntelligente(v) < soglia) ? `<span style="color:var(--red);font-weight:bold;">${v}</span>` : v;
            });
            html += `<tr><td>${ing.nome}</td><td>${vals[0]}</td><td>${vals[1]}</td><td>${vals[2]}</td></tr>`;
        });
        cont.innerHTML = html + "</tbody></table></div></div>";
    }

    function generaVistaArchivio() {
        const date = document.getElementById('archiveDate').value;
        const cont = document.getElementById('contenitore-lista');
        if (!date) return;
        cont.innerHTML = `<div class="archivio-header">📜 Archivio: ${date}</div>`;
        const d = ["CASTA", "SILEA", "BIBAN"].map(p => JSON.parse(localStorage.getItem(`archive_${p}_${date}`)) || null);
        if (d.every(x => !x)) { cont.innerHTML += `<div style="grid-column:1/-1;text-align:center;padding:20px;">Nessun dato.</div>`; return; }
        let html = ""; let currentCat = "";
        ingredienti.forEach(ing => {
            if(ing.cat !== currentCat) {
                if(currentCat !== "") html += `</tbody></table></div></div>`;
                html += `<div class="cat-group-container"><div class="categoria-header">${ing.cat}</div><div class="tabella-globale"><table><thead><tr><th>NOME</th><th>Casta</th><th>Silea</th><th>Biban</th></tr></thead><tbody>`;
                currentCat = ing.cat;
            }
            html += `<tr><td>${ing.nome}</td><td>${d[0]?.[ing.nome] || "-"}</td><td>${d[1]?.[ing.nome] || "-"}</td><td>${d[2]?.[ing.nome] || "-"}</td></tr>`;
        });
        cont.innerHTML += html + "</tbody></table></div></div>";
    }

    function creaLista() {
        const cont = document.getElementById('contenitore-lista');
        const p = document.getElementById('pizzeria').value;
        const searchBox = document.getElementById('search-box');
        
        cont.innerHTML = ""; cont.classList.remove("vista-tabellare");
        document.getElementById('btn-azzera').style.display = (p && p !== "TUTTE" && p !== "ARCHIVIO") ? "block" : "none";
        document.getElementById('footer-btns').style.display = (p && p !== "TUTTE" && p !== "ARCHIVIO") ? "flex" : "none";
        document.getElementById('date-picker-container').style.display = p === "ARCHIVIO" ? "block" : "none";
        
        // MOSTRA RICERCA SOLO PER PIZZERIE SINGOLE
        searchBox.style.display = (p && p !== "TUTTE" && p !== "ARCHIVIO") ? "block" : "none";
        document.getElementById('searchInput').value = "";

        if (p === "TUTTE") { generaVistaTutte(); return; }
        if (p === "ARCHIVIO" || !p) return;

        const s = JSON.parse(localStorage.getItem('inventario_dati_'+p)) || {};
        let currentCat = "";
        ingredienti.forEach((ing, i) => {
            if (ing.cat !== currentCat) {
                cont.innerHTML += `<div class="categoria-header cat-title" data-cat="${ing.cat}">${ing.cat}</div>`;
                currentCat = ing.cat;
            }
            const soglia = isWeekendDomani ? ing.we : ing.fer;
            const v = s[ing.nome] || "";
            const isCipolla = ing.nome === "cass.Cipolla";
            cont.innerHTML += `
                <div class="item ${v===''?'vuoto':''} ing-item" id="box-${i}" data-nome="${ing.nome.toLowerCase()}">
                    <div class="nome-container"><b>${ing.nome}</b><br><small>Min: ${soglia}</small></div>
                    <div class="input-container">
                        ${isCipolla ? `<div class="input-wrapper"><div class="sfuse-box"><small>Sfuse</small><input type="text" class="qty-input" id="sfuse-${i}" oninput="document.getElementById('sel-${i}').value = (this.value/20).toFixed(2); valuta(${i}, ${soglia})"></div>` : ''}
                        <input type="text" class="qty-input" id="sel-${i}" placeholder="Qtà" value="${v}" oninput="valuta(${i}, ${soglia})">
                        ${isCipolla ? `</div>` : ''}
                    </div>
                </div>`;
            if(v !== "") valuta(i, soglia);
        });
    }

    async function salvaDati() {
        const p = document.getElementById('pizzeria').value;
        if(!p) return;
        const d = {};
        ingredienti.forEach((ing, i) => { 
            const input = document.getElementById(`sel-${i}`);
            if(input) d[ing.nome] = input.value; 
        });
        localStorage.setItem('inventario_dati_'+p, JSON.stringify(d));
        localStorage.setItem(`archive_${p}_${oggiString}`, JSON.stringify(d));
        
        const cloud = {}; for(let i=0; i<localStorage.length; i++) cloud[localStorage.key(i)] = localStorage.getItem(localStorage.key(i));
        await syncCloud(cloud); alert("✅ Salvato e Sincronizzato!");
    }

    function cambiaPizzeria() { 
        localStorage.setItem('ultima_pizzeria', document.getElementById('pizzeria').value);
        creaLista(); 
    }
    
    function filtraLista() {
        const q = document.getElementById('searchInput').value.toLowerCase().trim();
        const items = document.querySelectorAll('.ing-item');
        const catTitles = document.querySelectorAll('.cat-title');
        
        items.forEach(it => {
            const nome = it.dataset.nome;
            // Mostra l'elemento solo se il nome contiene la ricerca
            if (q === "" || nome.includes(q)) {
                it.style.display = "flex";
            } else {
                it.style.display = "none";
            }
        });

        // Nascondi i titoli delle categorie se stiamo cercando
        catTitles.forEach(title => {
            title.style.display = (q === "") ? "block" : "none";
        });
    }
    
    function valuta(i, s) {
        const v = estraiNumeroIntelligente(document.getElementById(`sel-${i}`).value);
        document.getElementById(`box-${i}`).className = `item ${isNaN(v) ? 'vuoto' : (v < s ? 'urgente' : 'ok')} ing-item`;
    }

    function azzeraLista() { if(confirm("Cancellare i dati di oggi?")) { localStorage.removeItem('inventario_dati_'+document.getElementById('pizzeria').value); creaLista(); } }

    function inviaWhatsApp() {
        const p = document.getElementById('pizzeria').value;
        let msg = `🏪 *INV. ${p}*\n\n`;
        ingredienti.forEach((ing, i) => {
            const input = document.getElementById(`sel-${i}`);
            if (input && input.value !== "") {
                const v = estraiNumeroIntelligente(input.value);
                const s = isWeekendDomani ? ing.we : ing.fer;
                if(v < s) msg += `• *${ing.nome}*: ${input.value}\n`;
            }
        });
        window.location.href = "whatsapp://send?text=" + encodeURIComponent(msg);
    }
</script>
</body>
</html>
