    <style>
        :root { 
            --red: #ff4d4d; --green: #4caf50; --gold: #f39c12; --dark: #2c3e50;
            --cat-pasta: #cbd5e0; --cat-vaschette: #a8d08d; --cat-formaggi: #ffff00;
            --cat-salumi: #ed7d31; --cat-scaffaleria: #d9d9d9; --cat-fresco: #92d050;
            --cat-pesce: #9bc2e6; --cat-condimenti: #e2efda; --cat-freezer: #5b9bd5;
            --cat-impasti: #c6e0b4; --cat-combustibile: #ffeb3b; --cat-monete: #f2f2f2;
            --cat-imballaggi: #fce4d6; --cat-detersivi: #ddebf7; --cat-vario: #fff2cc;
        }
        body { font-family: -apple-system, sans-serif; background: #eef2f7; padding: 10px; margin: 0; padding-bottom: 110px; }
        .header-box { background: white; padding: 15px; border-radius: 12px; margin-bottom: 15px; box-shadow: 0 2px 5px rgba(0,0,0,0.1); border-top: 5px solid var(--gold); text-align: center; }
        select.pizzeria-select { width: 100%; padding: 12px; border-radius: 8px; border: 2px solid var(--gold); font-size: 18px; font-weight: bold; background: #fffcf5; margin-top: 10px; color: var(--dark); }
        
        .categoria-header { color: black; padding: 8px 12px; margin-top: 20px; border-radius: 8px 8px 0 0; font-size: 0.9em; font-weight: bold; text-transform: uppercase; text-align: center; border: 1px solid #999; }
        
        .item { background: white; padding: 10px 12px; display: flex; justify-content: space-between; align-items: center; border: 1px solid #ccc; border-top: none; position: relative; }
        .item:last-child { border-radius: 0 0 10px 10px; }
        
        /* STATI CASSELLE */
        .urgente { background: #ffcccc !important; border-left: 8px solid var(--red) !important; }
        .ok { background: #e2f0d9 !important; border-left: 8px solid var(--green) !important; }
        .vuoto { background: #fff9db !important; border-left: 8px solid var(--gold) !important; }
        
        .nome-ingrediente { font-weight: 500; color: #333; font-size: 0.9em; }
        .soglia-info { font-size: 0.65em; color: #888; }
        
        .input-container { position: relative; display: flex; align-items: center; }
        input.qty-input { width: 70px; height: 32px; border-radius: 4px; border: 1px solid #999; font-size: 16px; text-align: center; background: white; }
        
        /* Simbolo Punto Esclamativo */
        .warning-icon { color: var(--gold); font-weight: bold; font-size: 20px; margin-right: 8px; display: none; }
        .vuoto .warning-icon { display: block; }
        
        .btn-wa { position: fixed; bottom: 20px; left: 10px; right: 10px; background: #25D366; color: white; border: none; padding: 18px; border-radius: 15px; font-size: 1.1em; font-weight: bold; box-shadow: 0 5px 15px rgba(0,0,0,0.3); z-index: 999; }
    </style>
</head>

    function parseInput(valore) {
        if (valore === "" || valore === null) return null;
        valore = valore.replace(',', '.');
        if (valore.includes('/')) {
            const parti = valore.split('/');
            return parseFloat(parti[0]) / parseFloat(parti[1]);
        }
        return parseFloat(valore);
    }

    const oggi = new Date().getDay();
    const isWeekend = (oggi === 0 || oggi === 5 || oggi === 6);
    const giornoNome = ["Domenica", "Lunedì", "Martedì", "Mercoledì", "Giovedì", "Venerdì", "Sabato"][oggi];

    document.getElementById('info-giorno').innerHTML = `📅 <b>${giornoNome}</b> - Soglie ${isWeekend ? 'Weekend 🚀' : 'Feriali 🛡️'}`;

    function creaLista() {
        const cont = document.getElementById('contenitore-lista');
        let currentCat = "";
        
        ingredienti.forEach((ing, i) => {
            if(ing.cat !== currentCat) {
                cont.innerHTML += `<div class="categoria-header" style="background-color: ${ing.color}">${ing.cat}</div>`;
                currentCat = ing.cat;
            }
            const soglia = isWeekend ? ing.we : ing.fer;
            
            cont.innerHTML += `
                <div class="item vuoto" id="box-${i}">
                    <div>
                        <div class="nome-ingrediente">${ing.nome}</div>
                        <div class="soglia-info">Min: ${soglia}</div>
                    </div>
                    <div class="input-container">
                        <span class="warning-icon">!</span>
                        <input type="text" class="qty-input" id="sel-${i}" placeholder="-" oninput="valuta(${i}, ${soglia})">
                    </div>
                </div>`;
        });
    }

    function valuta(i, soglia) {
        const testoScritto = document.getElementById(`sel-${i}`).value;
        const valoreNumerico = parseInput(testoScritto);
        const box = document.getElementById(`box-${i}`);

        if (testoScritto.trim() === "") {
            box.className = "item vuoto";
        } else if (isNaN(valoreNumerico)) {
            box.className = "item";
        } else {
            box.className = (valoreNumerico < soglia) ? "item urgente" : "item ok";
        }
    }

    function inviaWhatsApp() {
        const pizzo = document.getElementById('pizzeria').value;
        if (!pizzo) { alert("⚠️ SELEZIONA LA PIZZERIA!"); return; }

        let msg = `🏪 *INV. ${pizzo}* - ${giornoNome.toUpperCase()}\n\n`;
        let trovati = false;
        let mancantiCompilazione = [];

        ingredienti.forEach((ing, i) => {
            const testoScritto = document.getElementById(`sel-${i}`).value.trim();
            const valoreNumerico = parseInput(testoScritto);
            const soglia = isWeekend ? ing.we : ing.fer;

            if (testoScritto === "") {
                mancantiCompilazione.push(ing.nome);
            } else if (!isNaN(valoreNumerico) && valoreNumerico < soglia) {
                msg += `• *${ing.nome}*: ${testoScritto} (Soglia: ${soglia})\n`;
                trovati = true;
            }
        });

        // Se ci sono caselle vuote, blocca l'invio e avvisa
        if (mancantiCompilazione.length > 0) {
            alert("⚠️ ATTENZIONE! Non hai compilato questi prodotti:\n\n- " + mancantiCompilazione.join("\n- "));
            return; 
        }

        if (!trovati) msg += "✅ Scorte OK!";
        window.location.href = "whatsapp://send?text=" + encodeURIComponent(msg);
    }

    creaLista();
