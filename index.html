<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Ordini e Rimanenze</title>
    
    <!-- Caricamento libreria esterna -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    
    <!-- Collegamento al file CSS -->
    <link rel="stylesheet" href="styles.css">
</head>
<body>

    <div id="modal-screenshot" style="display:none; position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.95); z-index:9999; flex-direction:column; align-items:center; justify-content:center; padding:20px; box-sizing:border-box;">
        <p style="color:white; font-size:16px; font-weight:bold; text-align:center; margin-bottom:15px; line-height:1.5;">
            ✅ Immagine Pronta!<br><br>
            <span style="color:var(--warn); font-size:14px;">Tieni premuto a lungo sull'immagine qui sotto per condividerla su WhatsApp o salvarla in Galleria.</span>
        </p>
        <div style="overflow:auto; max-height:65vh; width:100%; max-width:600px; border:2px solid var(--border); border-radius:10px; background:white;">
            <img id="img-risultato" style="width:100%; display:block;" />
        </div>
        <button onclick="document.getElementById('modal-screenshot').style.display='none'" style="margin-top:20px; background:var(--red-alert); color:white; width:100%; max-width:300px; padding:15px; border-radius:10px; font-weight:bold; border:none; text-transform:uppercase;">Chiudi</button>
    </div>

    <header><h1>ORDINI e RIMANENZE</h1></header>

    <div id="overlay"></div>
    <div id="dialog-vuoti">
        <h3 style="margin-top:0; color:var(--primary)">Attenzione</h3>
        <p style="font-size:14px;">Mancano le quantità per i seguenti articoli:</p>
        <div class="vuoti-list" id="lista-nomi-vuoti"></div>
        <div style="display:flex; gap:10px;">
            <button class="btn-save" style="background:#d7ccc8; color:var(--primary)" onclick="chiudiDialog()">MODIFICA</button>
            <button class="btn-save" style="background:var(--warn)" onclick="eseguiSalva(true)">SALVA COMUNQUE</button>
        </div>
    </div>

    <div class="header-box">
        <div id="sync-status">Sincronizzazione in corso...</div>
        <div id="info-giorno"></div>
        <label style="font-weight: bold; color: var(--primary); text-transform: uppercase;">SELEZIONA PUNTO VENDITA</label>
        <select id="pizzeria" class="pizzeria-select" onchange="cambiaPizzeria()" style="margin-top: 8px;">
            <option value="CASTA">CASTA</option>
            <option value="SILEA">SILEA</option>
            <option value="BIBAN">BIBAN</option>
            <option value="TUTTE">Visualizza tutte</option>
            <option value="ARCHIVIO">Archivio storico</option>
        </select>
        
        <div id="search-box" style="margin-top: 15px; display: none;">
            <input type="text" id="searchInput" class="search-input" placeholder="Cerca un ingrediente..." oninput="filtraLista()">
        </div>
        <div id="date-picker-container" style="display: none; margin-top:15px;">
            <input type="date" id="archiveDate" class="date-input" onchange="generaVistaArchivio()">
        </div>
        <button id="btn-azzera" class="btn-reset" onclick="azzeraLista()" style="display:none;">AZZERA LISTA ATTUALE</button>
    </div>

    <div id="contenitore-lista"></div>

    <div class="footer-controls" id="footer-btns" style="display:none;">
        <button class="btn-save" id="save-btn" onclick="controllaESalva()">SALVA</button>
        <button class="btn-wa" onclick="inviaWhatsApp()">INVIA REPORT</button>
    </div>

    <!-- Caricamento dei file JavaScript (prima i dati, poi la logica) -->
    <script src="data.js"></script>
    <script src="app.js"></script>
</body>
</html>
