        .header-box { background: white; padding: 15px; border-radius: 12px; margin-bottom: 15px; box-shadow: 0 2px 5px rgba(0,0,0,0.1); border-top: 5px solid var(--gold); text-align: center; }
        select.pizzeria-select, .date-input { width: 100%; padding: 12px; border-radius: 8px; border: 2px solid var(--gold); font-size: 18px; font-weight: bold; background: #fffcf5; margin-top: 10px; color: var(--dark); box-sizing: border-box; }
        .search-container { margin-top: 10px; display: none; }
        .search-input { width: 100%; padding: 10px; border-radius: 8px; border: 1px solid #ccc; font-size: 16px; box-sizing: border-box; }
        .btn-reset { display: none; background: var(--red); color: white; border: none; padding: 8px 15px; border-radius: 8px; font-size: 0.8em; font-weight: bold; margin-top: 10px; width: 100%; cursor: pointer; }
        .riepilogo-biban, .tabella-globale { background: white; border-radius: 10px; border: 2px solid #ccc; margin-bottom: 20px; overflow: hidden; font-size: 0.85em; box-shadow: 0 2px 5px rgba(0,0,0,0.05); }

        table { width: 100%; border-collapse: collapse; table-layout: fixed; }
        th { background: #f2f2f2; padding: 10px 5px; text-align: center; border-bottom: 2px solid #ddd; }
        th:first-child { text-align: left; width: 40%; padding-left: 10px; }
        td { padding: 10px 5px; border-bottom: 1px solid #eee; text-align: center; vertical-align: middle; }

        .sotto-soglia { color: var(--red); font-weight: bold; }
        .categoria-header { color: black; padding: 8px 12px; margin-top: 20px; border-radius: 8px 8px 0 0; font-size: 0.9em; font-weight: bold; text-transform: uppercase; text-align: center; border: 1px solid #999; }
        .item { background: white; padding: 10px 12px; display: flex; justify-content: space-between; align-items: center; border: 1px solid #ccc; border-top: none; position: relative; }
        .item:last-child { border-radius: 0 0 10px 10px; }
        .urgente { background: #ffcccc !important; border-left: 8px solid var(--red) !important; }
        .ok { background: #e2f0d9 !important; border-left: 8px solid var(--green) !important; }
        .vuoto { background: #fff9db !important; border-left: 8px solid var(--gold) !important; }
        .no-obbligo { background: white !important; border-left: 8px solid #ddd !important; }
        .nome-ingrediente { font-weight: 500; color: #333; font-size: 0.9em; }
        .soglia-info { font-size: 0.65em; color: #888; }
        input.qty-input { width: 85px; height: 32px; border-radius: 4px; border: 1px solid #999; font-size: 14px; text-align: center; background: white; }

        .mini-label { font-size: 9px; font-weight: bold; color: #555; text-transform: uppercase; }

    function soloNumeri(e) {
        const charCode = (e.which) ? e.which : e.keyCode;
        // Permette numeri (48-57), "/", ",", ".", "+"
        const allowed = [47, 44, 46, 43];
        if (allowed.includes(charCode)) return true;
        if (charCode > 31 && (charCode < 48 || charCode > 57)) return false;
        return true;
    }

    function estraiNumeroIntelligente(testo) {
        if (!testo) return NaN;
        testo = testo.toString().toLowerCase().trim().replace(',', '.');
        
        // Conversioni fisse
        if (testo === "1/4") return 0.2;
        if (testo === "1/3") return 0.3;
        if (testo === "1/2") return 0.5;
        if (testo === "2/3") return 0.7;
        if (testo === "3/4") return 0.7;

        // Calcoli matematici complessi
        try {
            if (testo.includes('+') || testo.includes('/')) {
                // Sostituiamo le frazioni con il loro valore prima di valutare la somma
                let espressione = testo.replace(/(\d+)\/(\d+)/g, (match, num, den) => {
                    return (parseFloat(num) / parseFloat(den));
                });
                // Eval è sicuro qui perché abbiamo filtrato i caratteri in ingresso
                return eval(espressione);
            }
            return parseFloat(testo);
        } catch(e) { return NaN; }
    }

    function generaVistaTutte() {
        const cont = document.getElementById('contenitore-lista');
        cont.innerHTML = "";
        const datiCasta = JSON.parse(localStorage.getItem('inventario_dati_CASTA')) || {};
        const datiSilea = JSON.parse(localStorage.getItem('inventario_dati_SILEA')) || {};
        const datiBiban = JSON.parse(localStorage.getItem('inventario_dati_BIBAN')) || {};
        let currentCat = "";
        let html = "";
        ingredienti.forEach((ing) => {
            const soglia = isWeekendDomani ? ing.we : ing.fer;
            const formattaValore = (valore, ingrediente) => {
                if (!valore || valore === "-") return "-";
                if (ingrediente.noObbligo) return valore;
                const num = estraiNumeroIntelligente(valore);
                if (!isNaN(num) && num < soglia) return `<span class="sotto-soglia">${valore}</span>`;
                return valore;
            };
            if(ing.cat !== currentCat) {
                if(currentCat !== "") html += `</tbody></table></div>`;
                html += `<div class="categoria-header" style="background-color: ${ing.color}">${ing.cat}</div><div class="tabella-globale cat-group"><table><thead><tr><th>NOME</th><th>Casta</th><th>Silea</th><th>Biban</th></tr></thead><tbody>`;
                currentCat = ing.cat;
            }
            let vC = datiCasta[ing.nome] || "-";
            let vS = datiSilea[ing.nome] || "-";
            let vB = datiBiban[ing.nome] || "-";
            if (ing.cat === "FREEZER") { vC = "-"; vS = "-"; }
            html += `<tr class="ing-item" data-nome="${ing.nome.toLowerCase()}"><td>${ing.nome}</td><td>${formattaValore(vC, ing)}</td><td>${formattaValore(vS, ing)}</td><td>${formattaValore(vB, ing)}</td></tr>`;
        });
        cont.innerHTML = html + "</tbody></table></div>";
    }

    function generaVistaArchivio() {
        const dataScelta = document.getElementById('archiveDate').value;
        const cont = document.getElementById('contenitore-lista');
        if (!dataScelta) return;
        cont.innerHTML = `<div class="archivio-header">📅 Archivio del: <b>${dataScelta}</b></div>`;
        const dCasta = JSON.parse(localStorage.getItem(`archive_CASTA_${dataScelta}`)) || null;
        const dSilea = JSON.parse(localStorage.getItem(`archive_SILEA_${dataScelta}`)) || null;
        const dBiban = JSON.parse(localStorage.getItem(`archive_BIBAN_${dataScelta}`)) || null;
        if (!dCasta && !dSilea && !dBiban) { cont.innerHTML += `<div style="padding:20px; text-align:center; color:red;">NESSUN DATO TROVATO.</div>`; return; }
        let currentCat = "";
        let html = "";
        ingredienti.forEach((ing) => {
            if(ing.cat !== currentCat) {
                if(currentCat !== "") html += `</tbody></table></div>`;
                html += `<div class="categoria-header" style="background-color: ${ing.color}">${ing.cat}</div><div class="tabella-globale cat-group"><table><thead><tr><th>NOME</th><th>Casta</th><th>Silea</th><th>Biban</th></tr></thead><tbody>`;
                currentCat = ing.cat;
            }
            let vC = (dCasta && dCasta[ing.nome]) ? dCasta[ing.nome] : "-";
            let vS = (dSilea && dSilea[ing.nome]) ? dSilea[ing.nome] : "-";
            let vB = (dBiban && dBiban[ing.nome]) ? dBiban[ing.nome] : "-";
            if (ing.cat === "FREEZER") { vC = "-"; vS = "-"; }
            html += `<tr class="ing-item" data-nome="${ing.nome.toLowerCase()}"><td>${ing.nome}</td><td>${vC}</td><td>${vS}</td><td>${vB}</td></tr>`;
        });
        cont.innerHTML += html + "</tbody></table></div>";
    }

    function calcolaCipollaSfusa(i, soglia) {
        const sfuseInput = document.getElementById(`sfuse-${i}`);
        const cassaInput = document.getElementById(`sel-${i}`);
        const sfuse = sfuseInput.value;
        if(sfuse && !isNaN(sfuse)) {
            const calcolo = (parseFloat(sfuse) / 20).toFixed(2);
            cassaInput.value = calcolo;
        } else {
            cassaInput.value = "";
        }
        valuta(i, soglia, "cass.Cipolla");
    }

    function valuta(i, soglia, nomeIngrediente) {
        const input = document.getElementById(`sel-${i}`);
        const box = document.getElementById(`box-${i}`);
        if(!input) return;
        
        let valTesto = input.value.trim();

        // Applichiamo la conversione solo se l'utente ha finito di digitare (blur) o se è una frazione secca
        const calcolato = estraiNumeroIntelligente(valTesto);
        
        // Cambiamo il colore del box in base al valore calcolato
        const facoltativo = ingredienti.find(ing => ing.nome === nomeIngrediente)?.noObbligo;
        if (valTesto === "") {
            box.className = facoltativo ? "item no-obbligo ing-item" : "item vuoto ing-item";
        } else {
            box.className = (calcolato < soglia) ? "item urgente ing-item" : "item ok ing-item";
        }
    }

    // Funzione per convertire il testo in numero quando si esce dal campo (blur)
    function finalizzaInput(input, soglia, nomeIngrediente) {
        const i = input.id.replace('sel-', '');
        let valTesto = input.value.trim();
        if (valTesto === "") return;

        const calcolato = estraiNumeroIntelligente(valTesto);
        if (!isNaN(calcolato)) {
            input.value = parseFloat(calcolato.toFixed(2));
            valuta(i, soglia, nomeIngrediente);
        }
    }

    function creaLista() {
        const cont = document.getElementById('contenitore-lista');
        const pizzo = document.getElementById('pizzeria').value;
        const btnAzzera = document.getElementById('btn-azzera');
        const searchBox = document.getElementById('search-box');
        const footerBtns = document.getElementById('footer-btns');
        const datePicker = document.getElementById('date-picker-container');
        const riepilogoDiv = document.getElementById('riepilogo-globale');
        cont.innerHTML = ""; riepilogoDiv.innerHTML = "";
        if (!pizzo) { btnAzzera.style.display = "none"; searchBox.style.display = "none"; footerBtns.style.display = "none"; datePicker.style.display = "none"; return; }
        if (pizzo === "ARCHIVIO") { btnAzzera.style.display = "none"; footerBtns.style.display = "none"; searchBox.style.display = "block"; datePicker.style.display = "block"; generaVistaArchivio(); return; }
        datePicker.style.display = "none"; searchBox.style.display = "block";
        if (pizzo === "TUTTE") { btnAzzera.style.display = "none"; footerBtns.style.display = "none"; generaVistaTutte(); return; }
        btnAzzera.style.display = "block"; footerBtns.style.display = "flex";
        if (pizzo === "BIBAN") generaTabellaRiepilogoBiban();
        let currentCat = "";
        const salvati = JSON.parse(localStorage.getItem('inventario_dati_' + pizzo)) || {};
        ingredienti.forEach((ing, i) => {
            let daMostrare = true;
            if (ing.cat === "FREEZER" && pizzo !== "BIBAN") daMostrare = false;
            if (ing.cat === "VERDURE CRUDE" && (pizzo !== "CASTA" || !isDomenicaOggi)) daMostrare = false;
            if (daMostrare) {
                if(ing.cat !== currentCat) {
                    cont.innerHTML += `<div class="categoria-header" style="background-color: ${ing.color}">${ing.cat}</div>`;
                    currentCat = ing.cat;
                }
                const soglia = isWeekendDomani ? ing.we : ing.fer;
                const vPrev = salvati[ing.nome] || "";
                let inputHtml = `<input type="text" class="qty-input" id="sel-${i}" placeholder="Qtà" value="${vPrev}" inputmode="decimal" onkeypress="return soloNumeri(event)" oninput="valuta(${i}, ${soglia}, '${ing.nome}')" onblur="finalizzaInput(this, ${soglia}, '${ing.nome}')">`;
                if(ing.nome === "cass.Cipolla") {
                    inputHtml = `<div class="input-wrapper"><span class="mini-label">N. cipolle</span><input type="text" class="qty-input" id="sfuse-${i}" inputmode="numeric" onkeypress="return soloNumeri(event)" oninput="calcolaCipollaSfusa(${i}, ${soglia})"><input type="text" class="qty-input" id="sel-${i}" placeholder="Cassa" value="${vPrev}" inputmode="decimal" onkeypress="return soloNumeri(event)" oninput="valuta(${i}, ${soglia}, '${ing.nome}')" onblur="finalizzaInput(this, ${soglia}, '${ing.nome}')"></div>`;
                }
                cont.innerHTML += `<div class="item ${ing.noObbligo ? 'no-obbligo' : (vPrev===''?'vuoto':'')} ing-item" id="box-${i}" data-nome="${ing.nome.toLowerCase()}"><div><div class="nome-ingrediente">${ing.nome}</div><div class="soglia-info">${ing.noObbligo ? '' : 'Min: ' + soglia}</div></div><div class="input-container">${inputHtml}</div></div>`;
                if(vPrev !== "") valuta(i, soglia, ing.nome);
            }
        });
    }

    function filtraLista() {
        const query = document.getElementById('searchInput').value.toLowerCase().trim();
        const items = document.querySelectorAll('.ing-item');
        const headers = document.querySelectorAll('.categoria-header');
        items.forEach(item => {
            const nome = item.getAttribute('data-nome');
            if (query === "barbazza") item.style.display = listaBarbazza.includes(nome) ? "flex" : "none";
            else item.style.display = nome.includes(query) ? "flex" : "none";
        });
        headers.forEach(h => h.style.display = (query === "") ? "block" : "none");
    }

    function salvaDati() {
        const pizzo = document.getElementById('pizzeria').value;
        if (!pizzo || pizzo === "TUTTE" || pizzo === "ARCHIVIO") return;
        let dati = {};
        ingredienti.forEach((ing, i) => { const input = document.getElementById(`sel-${i}`); if (input) dati[ing.nome] = input.value; });
        localStorage.setItem('inventario_dati_' + pizzo, JSON.stringify(dati));
        localStorage.setItem(`archive_${pizzo}_${oggiString}`, JSON.stringify(dati));
        localStorage.setItem('ultima_pizzeria', pizzo);
        alert("✅ Dati salvati!");
    }

    function generaTabellaRiepilogoBiban() {
        const div = document.getElementById('riepilogo-globale');
        const dC = JSON.parse(localStorage.getItem('inventario_dati_CASTA')) || {};
        const dS = JSON.parse(localStorage.getItem('inventario_dati_SILEA')) || {};
        const dB = JSON.parse(localStorage.getItem('inventario_dati_BIBAN')) || {};
        const pasta = ingredienti.filter(ing => ing.cat === "PASTA");
        let h = `<div class="riepilogo-biban"><table><thead><tr><th>PASTA</th><th>Casta</th><th>Silea</th><th>Biban</th></tr></thead><tbody>`;
        pasta.forEach(ing => { h += `<tr><td>${ing.nome}</td><td>${dC[ing.nome]||'-'}</td><td>${dS[ing.nome]||'-'}</td><td>${dB[ing.nome]||'-'}</td></tr>`; });
        div.innerHTML = h + "</tbody></table></div>";
    }

    function azzeraLista() { if(confirm("Azzero?")) { localStorage.removeItem('inventario_dati_'+document.getElementById('pizzeria').value); creaLista(); } }
    function cambiaPizzeria() { document.getElementById('searchInput').value = ""; creaLista(); }
    window.onload = function() { const uP = localStorage.getItem('ultima_pizzeria'); if(uP){document.getElementById('pizzeria').value=uP; creaLista();} }

    function inviaWhatsApp() {
        const pizzo = document.getElementById('pizzeria').value;
        let msg = `🏪 *INV. ${pizzo}* - PER ${nomiGiorni[domaniIdx].toUpperCase()}\n\n`;
        let trovati = false;
        ingredienti.forEach((ing, i) => {
            const input = document.getElementById(`sel-${i}`);
            if (input && input.value !== "") {
                const val = estraiNumeroIntelligente(input.value);
                const soglia = isWeekendDomani ? ing.we : ing.fer;
                if(val < soglia) { msg += `• *${ing.nome}*: ${input.value}\n`; trovati = true; }
            }
        });
        if(!trovati) msg += "✅ Tutto OK!";
        window.location.href = "whatsapp://send?text=" + encodeURIComponent(msg);
    }
</script>
