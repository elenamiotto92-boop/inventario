    <title>Inventario Pizzerie - Cloud Sync</title>

            --cat-crude: #e8f5e9;

        .header-box { background: var(--white); padding: 20px; border-radius: 16px; margin-bottom: 20px; box-shadow: 0 4px 12px rgba(62, 39, 35, 0.1); border-bottom: 4px solid var(--primary); text-align: center; max-width: 1400px; margin-left: auto; margin-right: auto; }
        select.pizzeria-select, .date-input { width: 100%; padding: 14px; border-radius: 10px; border: 1px solid var(--accent); font-size: 16px; font-weight: 600; background: #fafafa; margin-top: 10px; color: var(--primary); box-sizing: border-box; }
        .search-input { width: 100%; padding: 12px; border-radius: 10px; border: 1px solid var(--accent); font-size: 15px; box-sizing: border-box; background: #fff; }
        #contenitore-lista { display: grid; grid-template-columns: 1fr; gap: 15px; max-width: 1400px; margin: 0 auto; align-items: start; }
        
        .grid-vista-tutte { display: grid; grid-template-columns: 1fr; gap: 20px; grid-column: 1 / -1; }
        @media (min-width: 768px) { .grid-vista-tutte { grid-template-columns: repeat(2, 1fr); } }
        @media (min-width: 1200px) { .grid-vista-tutte { grid-template-columns: repeat(3, 1fr); } }

        @media (min-width: 768px) { #contenitore-lista:not(.vista-tabellare) { grid-template-columns: repeat(2, 1fr); } }
        @media (min-width: 1200px) { #contenitore-lista:not(.vista-tabellare) { grid-template-columns: repeat(3, 1fr); } }

        .item { background: var(--white); padding: 12px 15px; display: flex; justify-content: space-between; align-items: center; border: 1px solid var(--accent); border-radius: 12px; min-height: 85px; box-sizing: border-box; }
        .nome-container { flex: 1; padding-right: 10px; }

        .input-wrapper-cipolla { display: flex; flex-direction: column; align-items: flex-end; gap: 4px; }
        .sfuse-row { display: flex; align-items: center; gap: 5px; }
        input.qty-input { width: 80px; height: 36px; border-radius: 8px; border: 1px solid var(--accent); font-size: 16px; font-weight: bold; text-align: center; background: #fff; color: var(--primary); }
        
        .urgente { border-left: 6px solid var(--red) !important; background: #fff5f5 !important; }
        .ok { border-left: 6px solid var(--green) !important; background: #f1f8e9 !important; }
        .vuoto { border-left: 6px solid var(--gold) !important; background: #fffde7 !important; }

        .footer-controls { position: fixed; bottom: 0; left: 0; right: 0; background: rgba(255, 255, 255, 0.95); backdrop-filter: blur(10px); padding: 20px; box-shadow: 0 -4px 20px rgba(0,0,0,0.1); z-index: 1000; display: flex; flex-direction: row; gap: 15px; max-width: 1400px; margin: 0 auto; border-radius: 20px 20px 0 0; }
        .btn-wa { background: #25D366; color: white; border: none; padding: 16px; border-radius: 12px; font-size: 16px; font-weight: bold; flex: 1.2; }
        .btn-save { background: var(--primary); color: white; border: none; padding: 16px; border-radius: 12px; font-size: 16px; font-weight: bold; flex: 1; }
        .btn-reset { background: var(--red); color: white; border: none; padding: 10px; border-radius: 8px; font-size: 12px; font-weight: bold; margin-top: 15px; width: 100%; }

        #dialog-vuoti { display: none; position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%); background: white; padding: 25px; border-radius: 20px; box-shadow: 0 0 50px rgba(0,0,0,0.5); z-index: 2000; width: 90%; max-width: 400px; text-align: center; }
        #overlay { display: none; position: fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.6); z-index:1999; }
        .vuoti-list { text-align: left; max-height: 200px; overflow-y: auto; margin: 15px 0; font-size: 0.9em; color: var(--red); border: 1px solid #eee; padding: 10px; }

        .container-cat-tutte { background: white; border-radius: 12px; overflow: hidden; border: 1px solid var(--accent); box-shadow: 0 2px 6px rgba(0,0,0,0.05); }
        .tabella-tutte { width: 100%; border-collapse: collapse; font-size: 13px; }
        .tabella-tutte th { background: var(--primary); color: white; padding: 10px 2px; text-align: center; font-size: 11px; }
        .tabella-tutte td { padding: 8px 4px; border-bottom: 1px solid #eee; text-align: center; font-weight: bold; }
        .td-nome { text-align: left !important; padding-left: 8px !important; font-weight: normal !important; width: 40%; }
        .header-cat-tabella { font-weight: bold; padding: 10px; text-align: center; text-transform: uppercase; font-size: 12px; border-bottom: 2px solid var(--primary); }
    </style>
</head>
