<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">

    <title>Inventario Pizzerie - Premium</title>

            --primary: #6d4c41; 
            --secondary: #8d6e63; 
            --accent: #d7ccc8; 
            --background: #f5f5f2;

            --text: #3e2723;
            --red: #a30000;

        body { 
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif; 
            background: var(--background); 
            color: var(--text);
            padding: 10px; 
            margin: 0; 
            padding-bottom: 180px; 
        }
        
        .header-box { 
            background: var(--white); 
            padding: 20px; 
            border-radius: 16px; 
            margin-bottom: 20px; 
            box-shadow: 0 4px 12px rgba(62, 39, 35, 0.1); 
            border-bottom: 4px solid var(--primary); 
            text-align: center; 
            max-width: 1400px; 
            margin-left: auto; 
            margin-right: auto; 
        }

        select.pizzeria-select, .date-input { 
            width: 100%; 
            padding: 14px; 
            border-radius: 10px; 
            border: 1px solid var(--accent); 
            font-size: 16px; 
            font-weight: 600; 
            background: #fafafa; 
            margin-top: 10px; 
            color: var(--primary); 
            box-sizing: border-box;
        }

        .search-input { 
            width: 100%; 
            padding: 12px; 
            border-radius: 10px; 
            border: 1px solid var(--accent); 
            font-size: 15px; 
            box-sizing: border-box;
            background: #fff;
        }

        #contenitore-lista { 
            display: grid; 
            grid-template-columns: 1fr; 
            gap: 15px; 
            max-width: 1400px; 
            margin: 0 auto; 
            align-items: start; 
        }

        @media (min-width: 768px) { #contenitore-lista { grid-template-columns: repeat(2, 1fr); } }
        @media (min-width: 1200px) { #contenitore-lista { grid-template-columns: repeat(3, 1fr); } }

        .cat-group-container { 
            display: flex; 
            flex-direction: column; 
            background: var(--white); 
            border-radius: 12px; 
            overflow: hidden; 
            border: 1px solid var(--accent); 
            box-shadow: 0 2px 6px rgba(0,0,0,0.05);
            margin-bottom: 10px;
        }

        .categoria-header { 
            background: var(--primary); 
            color: var(--white); 
            padding: 12px; 
            font-size: 14px; 
            font-weight: 700; 
            text-transform: uppercase; 
            text-align: center; 
            grid-column: 1 / -1;
        }
        
        .tabella-globale { width: 100%; font-size: 0.85em; }
        table { width: 100%; border-collapse: collapse; table-layout: fixed; }
        th { background: var(--accent); color: var(--primary); padding: 10px 5px; text-align: center; border-bottom: 1px solid var(--accent); }
        th:first-child { text-align: left; width: 40%; padding-left: 10px; }
        td { padding: 10px 5px; border-bottom: 1px solid #eee; text-align: center; vertical-align: middle; }
        td:first-child { text-align: left; font-weight: bold; padding-left: 10px; background: #fafafa; }
        
        .item { 
            background: var(--white); 
            padding: 15px; 
            display: flex; 
            justify-content: space-between; 
            align-items: center; 
            border: 1px solid var(--accent); 
            border-radius: 12px; 
            min-height: 70px; 
            box-sizing: border-box; 
        }

        .urgente { border-left: 6px solid var(--red) !important; background: #fff5f5 !important; }
        .ok { border-left: 6px solid var(--green) !important; background: #f1f8e9 !important; }
        .vuoto { border-left: 6px solid var(--gold) !important; background: #fffde7 !important; }
        .no-obbligo { border-left: 6px solid #e0e0e0 !important; color: #9e9e9e; }

            font-size: 16px; 
            font-weight: bold;
            text-align: center; 
        }

        .footer-controls { 
            position: fixed; bottom: 0; left: 0; right: 0; 
            background: rgba(255, 255, 255, 0.95); 
            backdrop-filter: blur(10px);
            padding: 20px; 
            box-shadow: 0 -4px 20px rgba(0,0,0,0.1);

            display: flex; 
            flex-direction: row; 
            gap: 15px;

            border-radius: 20px 20px 0 0;

        .btn-save { background: var(--primary); color: white; border: none; padding: 16px; border-radius: 12px; font-size: 16px; font-weight: bold; flex: 1; }

    // --- LOGICA FESTIVITÀ ---
    function getPasqua(anno) {
        const a = anno % 19, b = Math.floor(anno / 100), c = anno % 100,
              d = Math.floor(b / 4), e = b % 4, f = Math.floor((b + 8) / 25),
              g = Math.floor((b - f + 1) / 3), h = (19 * a + b - d - g + 15) % 30,
              i = Math.floor(c / 4), k = c % 4, l = (32 + 2 * e + 2 * i - h - k) % 7,
              m = Math.floor((a + 11 * h + 22 * l) / 451),
              mese = Math.floor((h + l - 7 * m + 114) / 31),
              giorno = ((h + l - 7 * m + 114) % 31) + 1;
        return new Date(anno, mese - 1, giorno);
    }

    function isFestivo(data) {
        const d = data.getDate(), m = data.getMonth() + 1, y = data.getFullYear();
        const p = getPasqua(y);
        const pasquetta = new Date(p); pasquetta.setDate(p.getDate() + 1);
        if (data.getDay() === 0) return true; 
        const festivi = [`1-1`, `6-1`, `25-4`, `1-5`, `2-6`, `15-8`, `1-11`, `8-12`, `25-12`, `26-12` ];
        if (festivi.includes(`${d}-${m}`)) return true;
        if (d === p.getDate() && m === (p.getMonth()+1)) return true; 
        if (d === pasquetta.getDate() && m === (pasquetta.getMonth()+1)) return true;
        return false;
    }

    function soloNumeri(e) {
        const charCode = (e.which) ? e.which : e.keyCode;
        const allowed = [47, 44, 46, 43];
        if (allowed.includes(charCode)) return true;
        if (charCode > 31 && (charCode < 48 || charCode > 57)) return false;
        return true;
    }

    function estraiNumeroIntelligente(testo) {
        if (!testo) return NaN;
        testo = testo.toString().toLowerCase().trim().replace(',', '.');
        if (testo === "1/4") return 0.2;
        if (testo === "1/3") return 0.3;
        if (testo === "1/2") return 0.5;
        if (testo === "2/3") return 0.7;
        if (testo === "3/4") return 0.7;
        try {
            if (testo.includes('+') || testo.includes('/')) {
                let espressione = testo.replace(/(\d+)\/(\d+)/g, (match, num, den) => (parseFloat(num) / parseFloat(den)));
                return eval(espressione);
            }
            return parseFloat(testo);
        } catch(e) { return NaN; }
    }

    function valuta(i, soglia, nomeIngrediente) {
        const input = document.getElementById(`sel-${i}`);
        const box = document.getElementById(`box-${i}`);
        if(!input) return;
        let valTesto = input.value.trim();
        const calcolato = estraiNumeroIntelligente(valTesto);
        const facoltativo = ingredienti.find(ing => ing.nome === nomeIngrediente)?.noObbligo;
        if (valTesto === "") {
            box.className = facoltativo ? "item no-obbligo ing-item" : "item vuoto ing-item";
        } else {
            box.className = (calcolato < soglia) ? "item urgente ing-item" : "item ok ing-item";
        }
    }

    function finalizzaInput(input, soglia, nomeIngrediente) {
        const i = input.id.replace('sel-', '');
        let valTesto = input.value.trim();
        if (valTesto === "") return;
        const calcolato = estraiNumeroIntelligente(valTesto);
        if (!isNaN(calcolato)) {
            input.value = parseFloat(calcolato.toFixed(2));
            valuta(i, soglia, nomeIngrediente);
        }
    }

    function generaVistaTutte() {
        const cont = document.getElementById('contenitore-lista');
        cont.innerHTML = "";
        const dC = JSON.parse(localStorage.getItem('inventario_dati_CASTA')) || {};
        const dS = JSON.parse(localStorage.getItem('inventario_dati_SILEA')) || {};
        const dB = JSON.parse(localStorage.getItem('inventario_dati_BIBAN')) || {};
        let currentCat = ""; let html = "";
        ingredienti.forEach((ing) => {
            const soglia = isWeekendDomani ? ing.we : ing.fer;
            const fmt = (v, ingrediente) => {
                if (!v || v === "-") return "-";
                if (ingrediente.noObbligo) return v;
                const num = estraiNumeroIntelligente(v);
                return (!isNaN(num) && num < soglia) ? `<span style="color:var(--red); font-weight:bold;">${v}</span>` : v;
            };
            if(ing.cat !== currentCat) {
                if(currentCat !== "") html += `</tbody></table></div></div>`;
                html += `<div class="cat-group-container cat-section"><div class="categoria-header">${ing.cat}</div><div class="tabella-globale"><table><thead><tr><th>INGREDIENTE</th><th>Casta</th><th>Silea</th><th>Biban</th></tr></thead><tbody>`;
                currentCat = ing.cat;
            }
            html += `<tr class="ing-item" data-nome="${ing.nome.toLowerCase()}"><td>${ing.nome}</td><td>${fmt(dC[ing.nome],ing)}</td><td>${fmt(dS[ing.nome],ing)}</td><td>${fmt(dB[ing.nome],ing)}</td></tr>`;
        });
        cont.innerHTML = html + "</tbody></table></div></div>";
    }

    function generaVistaArchivio() {
        const dataScelta = document.getElementById('archiveDate').value;
        const cont = document.getElementById('contenitore-lista');
        if (!dataScelta) return;
        cont.innerHTML = `<div class="archivio-header">📜 Archivio: ${dataScelta}</div>`;
        const dC = JSON.parse(localStorage.getItem(`archive_CASTA_${dataScelta}`)) || null;
        const dS = JSON.parse(localStorage.getItem(`archive_SILEA_${dataScelta}`)) || null;
        const dB = JSON.parse(localStorage.getItem(`archive_BIBAN_${dataScelta}`)) || null;
        if (!dC && !dS && !dB) { cont.innerHTML += `<div style="grid-column:1/-1;text-align:center;padding:20px;">Nessun dato trovato.</div>`; return; }
        let currentCat = ""; let html = "";
        ingredienti.forEach((ing) => {
            if(ing.cat !== currentCat) {
                if(currentCat !== "") html += `</tbody></table></div></div>`;
                html += `<div class="cat-group-container cat-section"><div class="categoria-header">${ing.cat}</div><div class="tabella-globale"><table><thead><tr><th>INGREDIENTE</th><th>Casta</th><th>Silea</th><th>Biban</th></tr></thead><tbody>`;
                currentCat = ing.cat;
            }
            html += `<tr class="ing-item" data-nome="${ing.nome.toLowerCase()}"><td>${ing.nome}</td><td>${dC?.[ing.nome] || "-"}</td><td>${dS?.[ing.nome] || "-"}</td><td>${dB?.[ing.nome] || "-"}</td></tr>`;
        });
        cont.innerHTML += html + "</tbody></table></div></div>";
    }

    function calcolaCipollaSfusa(i, soglia) {
        const sfuse = document.getElementById(`sfuse-${i}`).value;
        const cassa = document.getElementById(`sel-${i}`);
        if(sfuse && !isNaN(sfuse)) { cassa.value = (parseFloat(sfuse)/20).toFixed(2); } else { cassa.value = ""; }
        valuta(i, soglia, "cass.Cipolla");
    }

    function creaLista() {
        const cont = document.getElementById('contenitore-lista');
        const pizzo = document.getElementById('pizzeria').value;
        const btnAzzera = document.getElementById('btn-azzera');
        const searchBox = document.getElementById('search-box');
        const footerBtns = document.getElementById('footer-btns');
        const datePicker = document.getElementById('date-picker-container');
        
        cont.innerHTML = "";
        if (!pizzo) { btnAzzera.style.display = "none"; searchBox.style.display = "none"; footerBtns.style.display = "none"; datePicker.style.display = "none"; return; }
        if (pizzo === "ARCHIVIO") { btnAzzera.style.display = "none"; footerBtns.style.display = "none"; searchBox.style.display = "none"; datePicker.style.display = "block"; generaVistaArchivio(); return; }
        if (pizzo === "TUTTE") { btnAzzera.style.display = "none"; footerBtns.style.display = "none"; searchBox.style.display = "block"; datePicker.style.display = "none"; generaVistaTutte(); return; }

        datePicker.style.display = "none"; searchBox.style.display = "block";
        btnAzzera.style.display = "block"; footerBtns.style.display = "flex";
        
        let currentCat = "";
        const salvati = JSON.parse(localStorage.getItem('inventario_dati_' + pizzo)) || {};
        
        ingredienti.forEach((ing, i) => {
            let daMostrare = true;
            if (ing.cat === "FREEZER" && pizzo !== "BIBAN") daMostrare = false;
            if (ing.cat === "VERDURE CRUDE" && (pizzo !== "CASTA" || oraAttuale.getDay() !== 0)) daMostrare = false;
            
            if (daMostrare) {
                if(ing.cat !== currentCat) {
                    cont.innerHTML += `<div class="categoria-header cat-section" style="grid-column: 1 / -1;">${ing.cat}</div>`;
                    currentCat = ing.cat;
                }
                const soglia = isWeekendDomani ? ing.we : ing.fer;
                const vPrev = salvati[ing.nome] || "";
                
                let inputHtml = `<input type="text" class="qty-input" id="sel-${i}" placeholder="Qtà" value="${vPrev}" inputmode="decimal" onkeypress="return soloNumeri(event)" oninput="valuta(${i}, ${soglia}, '${ing.nome}')" onblur="finalizzaInput(this, ${soglia}, '${ing.nome}')">`;
                
                if(ing.nome === "cass.Cipolla") {
                    inputHtml = `<div class="input-wrapper"><span class="mini-label">N. sfuse</span><input type="text" class="qty-input" id="sfuse-${i}" inputmode="numeric" onkeypress="return soloNumeri(event)" oninput="calcolaCipollaSfusa(${i}, ${soglia})"><input type="text" class="qty-input" id="sel-${i}" placeholder="Cassa" value="${vPrev}" inputmode="decimal" onkeypress="return soloNumeri(event)" oninput="valuta(${i}, ${soglia}, '${ing.nome}')" onblur="finalizzaInput(this, ${soglia}, '${ing.nome}')"></div>`;
                }
                
                cont.innerHTML += `<div class="item ${ing.noObbligo ? 'no-obbligo' : (vPrev===''?'vuoto':'')} ing-item" id="box-${i}" data-nome="${ing.nome.toLowerCase()}"><div><div class="nome-ingrediente">${ing.nome}</div><div class="soglia-info">${ing.noObbligo ? '' : 'Min: ' + soglia}</div></div><div class="input-container">${inputHtml}</div></div>`;
                if(vPrev !== "") valuta(i, soglia, ing.nome);
            }
        });
    }

    function filtraLista() {
        const q = document.getElementById('searchInput').value.toLowerCase().trim();
        const items = document.querySelectorAll('.ing-item');
        const headers = document.querySelectorAll('.cat-section');
        const containers = document.querySelectorAll('.cat-group-container');

        items.forEach(item => {
            const nome = item.getAttribute('data-nome');
            if (q === "barbazza") {
                item.style.display = listaBarbazza.includes(nome) ? (item.tagName === 'TR' ? 'table-row' : 'flex') : "none";
            } else {
                item.style.display = nome.includes(q) ? (item.tagName === 'TR' ? 'table-row' : 'flex') : "none";
            }
        });

        // Gestione testate categorie durante la ricerca
        if (q !== "") {
            headers.forEach(h => h.style.display = "none");
            if (q === "barbazza") {
                 containers.forEach(c => c.style.display = "flex"); 
            }
        } else {
            headers.forEach(h => h.style.display = "block");
            containers.forEach(c => c.style.display = "flex");
        }
    }

    function salvaDati() {
        const p = document.getElementById('pizzeria').value;
        if (!p || p === "TUTTE" || p === "ARCHIVIO") return;
        let dati = {};
        ingredienti.forEach((ing, i) => { const input = document.getElementById(`sel-${i}`); if (input) dati[ing.nome] = input.value; });
        localStorage.setItem('inventario_dati_' + p, JSON.stringify(dati));
        localStorage.setItem(`archive_${p}_${oggiString}`, JSON.stringify(dati));
        localStorage.setItem('ultima_pizzeria', p);
        alert("✅ Salvato!");
    }

    function cambiaPizzeria() { document.getElementById('searchInput').value = ""; creaLista(); }
    function azzeraLista() { if(confirm("Cancellare i dati di oggi?")) { localStorage.removeItem('inventario_dati_'+document.getElementById('pizzeria').value); creaLista(); } }
    window.onload = function() { const uP = localStorage.getItem('ultima_pizzeria'); if(uP){document.getElementById('pizzeria').value=uP; creaLista();} }

    function inviaWhatsApp() {
        const p = document.getElementById('pizzeria').value;
        let msg = `🏪 *INV. ${p}* - ${nomiGiorni[domani.getDay()].toUpperCase()}\n\n`;
        let trovati = false;
        ingredienti.forEach((ing, i) => {
            const input = document.getElementById(`sel-${i}`);
            if (input && input.value !== "") {
                const val = estraiNumeroIntelligente(input.value);
                const soglia = isWeekendDomani ? ing.we : ing.fer;
                if(val < soglia) { msg += `• *${ing.nome}*: ${input.value}\n`; trovati = true; }
            }
        });
        if(!trovati) msg += "✅ Tutto a posto!";
        window.location.href = "whatsapp://send?text=" + encodeURIComponent(msg);
    }
</script>
</body>
</html>
