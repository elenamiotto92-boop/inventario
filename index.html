<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Inventario Pizzerie</title>
    <style>
        :root { 
            --red: #ff4d4d; --green: #4caf50; --gold: #f39c12; --dark: #2c3e50;
            --cat-pasta: #cbd5e0; --cat-vaschette: #a8d08d; --cat-formaggi: #ffff00;
            --cat-salumi: #ed7d31; --cat-scaffaleria: #d9d9d9; --cat-fresco: #92d050;
            --cat-pesce: #9bc2e6; --cat-condimenti: #e2efda; --cat-freezer: #5b9bd5;
            --cat-impasti: #c6e0b4; --cat-combustibile: #ffeb3b; --cat-monete: #f2f2f2;
            --cat-imballaggi: #fce4d6; --cat-detersivi: #ddebf7; --cat-vario: #fff2cc;
            --cat-crude: #f8f9fa;
        }
        body { font-family: -apple-system, sans-serif; background: #eef2f7; padding: 10px; margin: 0; padding-bottom: 180px; }
        .header-box { background: white; padding: 15px; border-radius: 12px; margin-bottom: 15px; box-shadow: 0 2px 5px rgba(0,0,0,0.1); border-top: 5px solid var(--gold); text-align: center; }
        select.pizzeria-select, .date-input { width: 100%; padding: 12px; border-radius: 8px; border: 2px solid var(--gold); font-size: 18px; font-weight: bold; background: #fffcf5; margin-top: 10px; color: var(--dark); box-sizing: border-box; }
        .search-container { margin-top: 10px; display: none; }
        .search-input { width: 100%; padding: 10px; border-radius: 8px; border: 1px solid #ccc; font-size: 16px; box-sizing: border-box; }
        .btn-reset { display: none; background: var(--red); color: white; border: none; padding: 8px 15px; border-radius: 8px; font-size: 0.8em; font-weight: bold; margin-top: 10px; width: 100%; cursor: pointer; }
        .tabella-globale { background: white; border-radius: 10px; border: 2px solid var(--dark); margin-bottom: 20px; overflow: hidden; font-size: 0.85em; }
        table { width: 100%; border-collapse: collapse; table-layout: fixed; }
        th { background: #f2f2f2; padding: 10px 5px; text-align: center; border-bottom: 2px solid #ddd; }
        th:first-child { text-align: left; width: 40%; padding-left: 10px; }
        td { padding: 10px 5px; border-bottom: 1px solid #eee; text-align: center; }
        td:first-child { text-align: left; font-weight: bold; padding-left: 10px; background: #fafafa; }
        .item { background: white; padding: 10px 12px; display: flex; justify-content: space-between; align-items: center; border: 1px solid #ccc; border-top: none; }
        .urgente { background: #ffcccc !important; border-left: 8px solid var(--red) !important; }
        .ok { background: #e2f0d9 !important; border-left: 8px solid var(--green) !important; }
        .vuoto { background: #fff9db !important; border-left: 8px solid var(--gold) !important; }
        input.qty-input { width: 70px; height: 32px; border-radius: 4px; border: 1px solid #999; font-size: 14px; text-align: center; }
        .cipolla-extra { font-size: 0.7em; color: #555; margin-left: 5px; }
        .footer-controls { position: fixed; bottom: 0; left: 0; right: 0; background: white; padding: 15px 10px 25px 10px; box-shadow: 0 -5px 15px rgba(0,0,0,0.1); z-index: 1000; display: flex; flex-direction: column; gap: 10px; }
        .btn-wa { background: #25D366; color: white; border: none; padding: 15px; border-radius: 12px; font-size: 1.1em; font-weight: bold; flex: 1; }
        .btn-save { background: #3498db; color: white; border: none; padding: 15px; border-radius: 12px; font-size: 1.1em; font-weight: bold; flex: 1; }
    </style>
</head>
<body>

        <div id="info-giorno"></div>

            <option value="SILEA">SILEA</option>

        </div>
        <div id="date-picker-container" style="display: none; margin-top:10px;">

        </div>
        <button id="btn-azzera" class="btn-reset" onclick="azzeraLista()">🗑️ AZZERA LISTA</button>
    </div>
    <div id="riepilogo-globale"></div>

    <div class="footer-controls" id="footer-btns">

    const oraAttuale = new Date();
    const oggiString = oraAttuale.toISOString().split('T')[0];
    const nomiGiorni = ["Domenica", "Lunedì", "Martedì", "Mercoledì", "Giovedì", "Venerdì", "Sabato"];
    const oggiIdx = oraAttuale.getDay();
    const domaniIdx = (oggiIdx + 1) % 7;
    const isWeekendDomani = (domaniIdx === 0 || domaniIdx === 5 || domaniIdx === 6);

    document.getElementById('info-giorno').innerHTML = `Oggi è <b>${nomiGiorni[oggiIdx]}</b> | Inv. per <b>${nomiGiorni[domaniIdx]}</b>`;

    function soloNumeri(e) {
        const charCode = (e.which) ? e.which : e.keyCode;
        if (charCode == 47 || charCode == 44 || charCode == 46) return true; // Permette / , .
        if (charCode > 31 && (charCode < 48 || charCode > 57)) return false;
        return true;
    }

    function gestisciInput(input, soglia, nomeIngrediente) {
        let val = input.value;
        // Conversioni automatiche
        if (val === "1/4") val = "0.2";
        if (val === "1/3") val = "0.3";
        if (val === "1/2") val = "0.5";
        if (val === "2/3") val = "0.7";
        input.value = val;
        valuta(input.id.replace('sel-',''), soglia, nomeIngrediente);
    }

    function gestisciCipolleSfuse(i, soglia) {
        const sfuse = document.getElementById(`sfuse-${i}`).value;
        const inputCassa = document.getElementById(`sel-${i}`);
        if (sfuse && !isNaN(sfuse)) {
            const calcolo = (parseFloat(sfuse) / 20).toFixed(2);
            inputCassa.value = calcolo;
            valuta(i, soglia, "cass.Cipolla");
        }
    }

    function valuta(i, soglia, nomeIngrediente) {
        const input = document.getElementById(`sel-${i}`);
        const box = document.getElementById(`box-${i}`);
        const val = parseFloat(input.value.replace(',', '.'));
        if (input.value === "") box.className = "item vuoto";
        else if (isNaN(val) || val < soglia) box.className = "item urgente";
        else box.className = "item ok";
    }

    function salvaDati() {
        const pizzo = document.getElementById('pizzeria').value;
        if (!pizzo || pizzo === "TUTTE" || pizzo === "ARCHIVIO") return;
        let dati = {};
        ingredienti.forEach((ing, i) => {
            const input = document.getElementById(`sel-${i}`);
            if (input) dati[ing.nome] = input.value;
        });
        localStorage.setItem('inventario_dati_' + pizzo, JSON.stringify(dati));
        localStorage.setItem(`archive_${pizzo}_${oggiString}`, JSON.stringify(dati));
        alert("✅ Salvato anche in Archivio!");
    }

    function creaLista() {
        const cont = document.getElementById('contenitore-lista');
        const pizzo = document.getElementById('pizzeria').value;
        const datePicker = document.getElementById('date-picker-container');
        const footer = document.getElementById('footer-btns');
        cont.innerHTML = "";
        
        if (pizzo === "ARCHIVIO") {
            datePicker.style.display = "block";
            footer.style.display = "none";
            return;
        }
        
        datePicker.style.display = "none";
        footer.style.display = "flex";
        if (pizzo === "TUTTE") { generaVistaTutte(); return; }

        let currentCat = "";
        const salvati = JSON.parse(localStorage.getItem('inventario_dati_' + pizzo)) || {};

        ingredienti.forEach((ing, i) => {
            if(ing.cat !== currentCat) {
                cont.innerHTML += `<div class="categoria-header" style="background-color: ${ing.color}">${ing.cat}</div>`;
                currentCat = ing.cat;
            }
            const soglia = isWeekendDomani ? ing.we : ing.fer;
            const valPrev = salvati[ing.nome] || "";
            
            let extraCipolla = "";
            if (ing.isCipolla) {
                extraCipolla = `<span class="cipolla-extra">Sfuse:</span> <input type="text" class="qty-input" id="sfuse-${i}" inputmode="numeric" onkeypress="return soloNumeri(event)" oninput="gestisciCipolleSfuse(${i}, ${soglia})">`;
            }

            cont.innerHTML += `
                <div class="item vuoto" id="box-${i}">
                    <div>
                        <div class="nome-ingrediente">${ing.nome}</div>
                        <div class="soglia-info">Min: ${soglia}</div>
                    </div>
                    <div>
                        ${extraCipolla}
                        <input type="text" class="qty-input" id="sel-${i}" value="${valPrev}" 
                               inputmode="decimal" onkeypress="return soloNumeri(event)" 
                               oninput="gestisciInput(this, ${soglia}, '${ing.nome}')">
                    </div>
                </div>`;
            if(valPrev !== "") valuta(i, soglia, ing.nome);
        });
    }

    function generaVistaTutte() {
        const cont = document.getElementById('contenitore-lista');
        const dC = JSON.parse(localStorage.getItem('inventario_dati_CASTA')) || {};
        const dS = JSON.parse(localStorage.getItem('inventario_dati_SILEA')) || {};
        const dB = JSON.parse(localStorage.getItem('inventario_dati_BIBAN')) || {};
        let currentCat = "";
        let html = "";
        ingredienti.forEach(ing => {
            if(ing.cat !== currentCat) {
                if(currentCat !== "") html += "</tbody></table></div>";
                html += `<div class="categoria-header" style="background-color: ${ing.color}">${ing.cat}</div><div class="tabella-globale"><table><thead><tr><th></th><th>Casta</th><th>Silea</th><th>Biban</th></tr></thead><tbody>`;
                currentCat = ing.cat;
            }
            html += `<tr><td>${ing.nome}</td><td>${dC[ing.nome]||'-'}</td><td>${dS[ing.nome]||'-'}</td><td>${dB[ing.nome]||'-'}</td></tr>`;
        });
        cont.innerHTML = html + "</tbody></table></div>";
    }

    function generaVistaArchivio() {
        const data = document.getElementById('archiveDate').value;
        const cont = document.getElementById('contenitore-lista');
        const dC = JSON.parse(localStorage.getItem(`archive_CASTA_${data}`)) || null;
        const dS = JSON.parse(localStorage.getItem(`archive_SILEA_${data}`)) || null;
        const dB = JSON.parse(localStorage.getItem(`archive_BIBAN_${data}`)) || null;
        if(!dC && !dS && !dB) { cont.innerHTML = "❌ Nessun dato."; return; }
        let currentCat = "";
        let html = `<h3>Dati del ${data}</h3>`;
        ingredienti.forEach(ing => {
            if(ing.cat !== currentCat) {
                if(currentCat !== "") html += "</tbody></table></div>";
                html += `<div class="categoria-header" style="background-color: ${ing.color}">${ing.cat}</div><div class="tabella-globale"><table><tbody>`;
                currentCat = ing.cat;
            }
            html += `<tr><td>${ing.nome}</td><td>${(dC?dC[ing.nome]:'-')}</td><td>${(dS?dS[ing.nome]:'-')}</td><td>${(dB?dB[ing.nome]:'-')}</td></tr>`;
        });
        cont.innerHTML = html;
    }

    function cambiaPizzeria() { creaLista(); }
    function filtraLista() { /* ... logica esistente ... */ }
    function azzeraLista() { if(confirm("Azzero?")) { localStorage.removeItem('inventario_dati_'+document.getElementById('pizzeria').value); creaLista(); } }
    
    function inviaWhatsApp() {
        const pizzo = document.getElementById('pizzeria').value;
        let msg = `🏪 *INV. ${pizzo}*\n\n`;
        ingredienti.forEach((ing, i) => {
            const input = document.getElementById(`sel-${i}`);
            if (input && input.value !== "") {
                const val = parseFloat(input.value);
                const soglia = isWeekendDomani ? ing.we : ing.fer;
                if(val < soglia) msg += `• *${ing.nome}*: ${input.value}\n`;
            }
        });
        window.location.href = "whatsapp://send?text=" + encodeURIComponent(msg);
    }
</script>
