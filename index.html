<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Inventario Pizzerie</title>
    <style>
        :root { 
            --red: #ff4d4d; --green: #4caf50; --gold: #f39c12; --dark: #2c3e50;
            --cat-pasta: #cbd5e0; --cat-vaschette: #a8d08d; --cat-formaggi: #ffff00;
            --cat-salumi: #ed7d31; --cat-scaffaleria: #d9d9d9; --cat-fresco: #92d050;

            --cat-impasti: #c6e0b4; --cat-combustibile: #ffeb3b; --cat-monete: #f2f2f2;
            --cat-imballaggi: #fce4d6; --cat-detersivi: #ddebf7; --cat-vario: #fff2cc;
            --cat-crude: #f8f9fa;
        }
        body { font-family: -apple-system, sans-serif; background: #eef2f7; padding: 10px; margin: 0; padding-bottom: 180px; }
        .header-box { background: white; padding: 15px; border-radius: 12px; margin-bottom: 15px; box-shadow: 0 2px 5px rgba(0,0,0,0.1); border-top: 5px solid var(--gold); text-align: center; }
        select.pizzeria-select, .date-input { width: 100%; padding: 12px; border-radius: 8px; border: 2px solid var(--gold); font-size: 18px; font-weight: bold; background: #fffcf5; margin-top: 10px; color: var(--dark); box-sizing: border-box; }
        .search-container { margin-top: 10px; display: none; }
        .search-input { width: 100%; padding: 10px; border-radius: 8px; border: 1px solid #ccc; font-size: 16px; box-sizing: border-box; }
        .btn-reset { display: none; background: var(--red); color: white; border: none; padding: 8px 15px; border-radius: 8px; font-size: 0.8em; font-weight: bold; margin-top: 10px; width: 100%; cursor: pointer; }
        .riepilogo-biban, .tabella-globale { background: white; border-radius: 10px; border: 2px solid #ccc; margin-bottom: 20px; overflow: hidden; font-size: 0.85em; box-shadow: 0 2px 5px rgba(0,0,0,0.05); }
        .tabella-globale { border: 2px solid var(--dark); }
        table { width: 100%; border-collapse: collapse; table-layout: fixed; }
        th { background: #f2f2f2; padding: 10px 5px; text-align: center; border-bottom: 2px solid #ddd; }
        th:first-child { text-align: left; width: 40%; padding-left: 10px; }
        td { padding: 10px 5px; border-bottom: 1px solid #eee; text-align: center; vertical-align: middle; }
        td:first-child { text-align: left; font-weight: bold; padding-left: 10px; background: #fafafa; }
        .sotto-soglia { color: var(--red); font-weight: bold; }
        .categoria-header { color: black; padding: 8px 12px; margin-top: 20px; border-radius: 8px 8px 0 0; font-size: 0.9em; font-weight: bold; text-transform: uppercase; text-align: center; border: 1px solid #999; }
        .item { background: white; padding: 10px 12px; display: flex; justify-content: space-between; align-items: center; border: 1px solid #ccc; border-top: none; position: relative; }
        .item:last-child { border-radius: 0 0 10px 10px; }
        .urgente { background: #ffcccc !important; border-left: 8px solid var(--red) !important; }
        .ok { background: #e2f0d9 !important; border-left: 8px solid var(--green) !important; }
        .vuoto { background: #fff9db !important; border-left: 8px solid var(--gold) !important; }
        .no-obbligo { background: white !important; border-left: 8px solid #ddd !important; }
        .errore-testo { background: #6c757d !important; border-left: 8px solid black !important; color: white !important; }
        .nome-ingrediente { font-weight: 500; color: #333; font-size: 0.9em; }
        .soglia-info { font-size: 0.65em; color: #888; }
        input.qty-input { width: 90px; height: 32px; border-radius: 4px; border: 1px solid #999; font-size: 14px; text-align: center; background: white; }
        /* Nuovi stili per cipolla sfusa */
        .input-group { display: flex; flex-direction: column; gap: 5px; align-items: flex-end; }
        .label-sfuse { font-size: 10px; color: #666; font-weight: bold; }

        .footer-controls { position: fixed; bottom: 0; left: 0; right: 0; background: white; padding: 15px 10px 25px 10px; box-shadow: 0 -5px 15px rgba(0,0,0,0.1); z-index: 1000; display: flex; flex-direction: column; gap: 10px; }
        .btn-wa { background: #25D366; color: white; border: none; padding: 15px; border-radius: 12px; font-size: 1.1em; font-weight: bold; cursor: pointer; flex: 1; }
        .btn-save { background: #3498db; color: white; border: none; padding: 15px; border-radius: 12px; font-size: 1.1em; font-weight: bold; cursor: pointer; flex: 1; }
        .archivio-header { background: var(--dark); color: white; padding: 10px; border-radius: 8px; margin-top: 15px; font-size: 0.9em; }
    </style>
</head>
<body>
    <div class="header-box">
        <div id="info-giorno" style="font-size: 0.9em; color: #666;"></div>
        <select id="pizzeria" class="pizzeria-select" onchange="cambiaPizzeria()">

            <option value="CASTA">CASTA</option>
            <option value="SILEA">SILEA</option>
            <option value="BIBAN">BIBAN</option>
            <option value="TUTTE">📊 TUTTE (VISUALIZZA)</option>
            <option value="ARCHIVIO">📜 ARCHIVIO STORICO</option>
        </select>
        <div id="search-box" class="search-container">
            <input type="text" id="searchInput" class="search-input" placeholder="🔍 Cerca..." oninput="filtraLista()">
        </div>

        <div id="date-picker-container" style="display: none; margin-top:10px;">
            <label style="font-size: 0.8em; font-weight: bold;">CONSULTA DATA:</label>
            <input type="date" id="archiveDate" class="date-input" onchange="generaVistaArchivio()">
        </div>

        <button id="btn-azzera" class="btn-reset" onclick="azzeraLista()">🗑️ AZZERA LISTA</button>
    </div>
    <div id="riepilogo-globale"></div>
    <div id="contenitore-lista"></div>
    <div class="footer-controls" id="footer-btns">
        <button class="btn-save" onclick="salvaDati()">💾 SALVA DATI</button>
        <button class="btn-wa" onclick="inviaWhatsApp()">📤 INVIA REPORT MANCANTI</button>
    </div>
