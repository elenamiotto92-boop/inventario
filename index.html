            background: var(--white); padding: 20px; border-radius: 16px;

            border-bottom: 4px solid var(--primary); text-align: center; 
            max-width: 1400px; margin-left: auto; margin-right: auto; 
        }

        select.pizzeria-select, .date-input { 
            width: 100%; padding: 14px; border-radius: 10px; border: 1px solid var(--accent); 
            font-size: 16px; font-weight: 600; background: #fafafa; margin-top: 10px; color: var(--primary); box-sizing: border-box;
        }

        .search-input { 
            width: 100%; padding: 12px; border-radius: 10px; border: 1px solid var(--accent); 
            font-size: 15px; box-sizing: border-box; background: #fff;
        }

        #contenitore-lista { 
            display: grid; grid-template-columns: 1fr; gap: 15px;

        }

        th { background: var(--accent); color: var(--primary); padding: 10px 5px; text-align: center; border-bottom: 2px solid var(--primary); }
        th:first-child { text-align: left; width: 40%; padding-left: 10px; }
        td { padding: 10px 5px; border-bottom: 1px solid #eee; text-align: center; vertical-align: middle; }
        td:first-child { text-align: left; font-weight: bold; padding-left: 10px; background: #fafafa; }

        .item { 
            background: var(--white); padding: 12px 15px; display: flex; 
            justify-content: space-between; align-items: center; border: 1px solid var(--accent); 
            border-radius: 12px; min-height: 85px; box-sizing: border-box;

        .input-container { display: flex; align-items: center; justify-content: flex-end; gap: 8px; }
        
        .input-wrapper-cipolla { display: flex; flex-direction: column; align-items: flex-end; gap: 4px; }
        .sfuse-row { display: flex; align-items: center; gap: 5px; }

        input.qty-input {

            font-size: 16px; font-weight: bold; text-align: center; background: #fff; color: var(--primary);

        .ok { border-left: 6px solid var(--green) !important; background: #f1f8e9 !important; }
        .vuoto { border-left: 6px solid var(--gold) !important; background: #fffde7 !important; }

        .footer-controls { 
            position: fixed; bottom: 0; left: 0; right: 0; background: rgba(255, 255, 255, 0.95); 
            backdrop-filter: blur(10px); padding: 20px; box-shadow: 0 -4px 20px rgba(0,0,0,0.1);

        .btn-reset { background: var(--red); color: white; border: none; padding: 10px; border-radius: 8px; font-size: 12px; font-weight: bold; margin-top: 15px; width: 100%; }

    </style>
</head>

    async function syncCloud(data = null) {
        const status = document.getElementById('sync-status');
        try {
            if (data) {
                status.innerText = '⏳ Sincronizzazione...';
                await fetch(`https://api.jsonbin.io/v3/b/${BIN_ID}`, {
                    method: 'PUT',
                    headers: { 'Content-Type': 'application/json', 'X-Master-Key': API_KEY },
                    body: JSON.stringify(data)
                });
                status.innerText = '✅ Cloud Aggiornato';
            } else {
                status.innerText = '⏳ Caricamento...';
                const res = await fetch(`https://api.jsonbin.io/v3/b/${BIN_ID}/latest`, {
                    headers: { 'X-Master-Key': API_KEY }
                });
                const cloudData = await res.json();
                if(cloudData.record) {
                    Object.keys(cloudData.record).forEach(key => localStorage.setItem(key, cloudData.record[key]));
                    status.innerText = '✅ Dati Sincronizzati';
                    creaLista();
                }
            }
        } catch (e) { status.innerText = '❌ Errore Cloud'; }
    }

        const festivi = [`1-1`, `6-1`, `25-4`, `1-5`, `2-6`, `15-8`, `1-11`, `8-12`, `25-12`, `26-12` ];
        return festivi.includes(`${data.getDate()}-${data.getMonth()+1}`);

        t = t.toString().toLowerCase().trim().replace(',', '.');

        document.getElementById('btn-azzera').style.display = (p && p !== "TUTTE" && p !== "ARCHIVIO") ? "block" : "none";
        document.getElementById('footer-btns').style.display = (p && p !== "TUTTE" && p !== "ARCHIVIO") ? "flex" : "none";
        document.getElementById('date-picker-container').style.display = p === "ARCHIVIO" ? "block" : "none";
        searchBox.style.display = (p && p !== "TUTTE" && p !== "ARCHIVIO") ? "block" : "none";

        if (p === "TUTTE") { generaVistaTutte(); return; }
        if (p === "ARCHIVIO" || !p) return;

        const s = JSON.parse(localStorage.getItem('inventario_dati_'+p)) || {};
        let currentCat = "";
        ingredienti.forEach((ing, i) => {
            // Filtri specifici richiesti
            if (ing.nome === "Lievito" && p !== "BIBAN") return;
            if (ing.nome === "Pel.Salsa" && p !== "CASTA") return;
            if (ing.cat === "VERDURE CRUDE" && (p !== "CASTA" || oraAttuale.getDay() !== 0)) return;

            if (ing.cat !== currentCat) {
                cont.innerHTML += `<div class="categoria-header cat-title" style="background:${ing.color}; color:#3e2723">${ing.cat}</div>`;
                currentCat = ing.cat;
            }
            const soglia = isWeekendDomani ? ing.we : ing.fer;
            const v = s[ing.nome] || "";
            const isCipolla = ing.nome === "cass.Cipolla";
            
            let inputHtml = isCipolla ? `
                <div class="input-wrapper-cipolla">
                    <div class="sfuse-row"><small>Sfuse</small><input type="text" class="qty-input" id="sfuse-${i}" oninput="document.getElementById('sel-${i}').value = (this.value/20).toFixed(2); valuta(${i}, ${soglia})"></div>
                    <input type="text" class="qty-input" id="sel-${i}" placeholder="Qtà" value="${v}" oninput="valuta(${i}, ${soglia})">
                </div>` : `
                <input type="text" class="qty-input" id="sel-${i}" placeholder="Qtà" value="${v}" oninput="valuta(${i}, ${soglia})">`;

            cont.innerHTML += `
                <div class="item ${v===''?'vuoto':''} ing-item" id="box-${i}" data-nome="${ing.nome.toLowerCase()}">
                    <div class="nome-container"><b>${ing.nome}</b><br><small>Min: ${soglia}</small></div>
                    <div class="input-container">${inputHtml}</div>
                </div>`;
            if(v !== "") valuta(i, soglia);
        });
    }

    function generaVistaTutte() {
        const cont = document.getElementById('contenitore-lista');
        cont.classList.add("vista-tabellare");
        const d = ["CASTA", "SILEA", "BIBAN"].map(p => JSON.parse(localStorage.getItem('inventario_dati_'+p)) || {});
        let html = ""; let currentCat = "";
        ingredienti.forEach(ing => {
            if(ing.cat !== currentCat) {
                if(currentCat !== "") html += `</tbody></table></div></div>`;
                html += `<div class="cat-group-container"><div class="categoria-header" style="background:${ing.color}; color:#3e2723">${ing.cat}</div><div class="tabella-globale"><table><thead><tr><th>NOME</th><th>Casta</th><th>Silea</th><th>Biban</th></tr></thead><tbody>`;
                currentCat = ing.cat;
            }
            const soglia = isWeekendDomani ? ing.we : ing.fer;
            const vals = d.map(p => {
                const v = p[ing.nome] || "-";
                return (!isNaN(estraiNumeroIntelligente(v)) && estraiNumeroIntelligente(v) < soglia) ? `<span style="color:var(--red);font-weight:bold;">${v}</span>` : v;
            });
            html += `<tr><td>${ing.nome}</td><td>${vals[0]}</td><td>${vals[1]}</td><td>${vals[2]}</td></tr>`;
        });
        cont.innerHTML = html + "</tbody></table></div></div>";
    }

    function generaVistaArchivio() {
        const date = document.getElementById('archiveDate').value;
        const cont = document.getElementById('contenitore-lista');
        if (!date) return;
        cont.innerHTML = `<div class="archivio-header">📜 Archivio: ${date}</div>`;
        const d = ["CASTA", "SILEA", "BIBAN"].map(p => JSON.parse(localStorage.getItem(`archive_${p}_${date}`)) || null);
        let html = ""; let currentCat = "";
        ingredienti.forEach(ing => {
            if(ing.cat !== currentCat) {
                if(currentCat !== "") html += `</tbody></table></div></div>`;
                html += `<div class="cat-group-container"><div class="categoria-header" style="background:${ing.color}; color:#3e2723">${ing.cat}</div><div class="tabella-globale"><table><thead><tr><th>NOME</th><th>Casta</th><th>Silea</th><th>Biban</th></tr></thead><tbody>`;
                currentCat = ing.cat;
            }
            html += `<tr><td>${ing.nome}</td><td>${d[0]?.[ing.nome] || "-"}</td><td>${d[1]?.[ing.nome] || "-"}</td><td>${d[2]?.[ing.nome] || "-"}</td></tr>`;
        });
        cont.innerHTML += html + "</tbody></table></div></div>";
    }

    async function salvaDati() {
        const p = document.getElementById('pizzeria').value;
        if(!p) return;
        const d = {};
        ingredienti.forEach((ing, i) => { const input = document.getElementById(`sel-${i}`); if(input) d[ing.nome] = input.value; });
        localStorage.setItem('inventario_dati_'+p, JSON.stringify(d));
        localStorage.setItem(`archive_${p}_${oggiString}`, JSON.stringify(d));
        const cloud = {}; for(let i=0; i<localStorage.length; i++) cloud[localStorage.key(i)] = localStorage.getItem(localStorage.key(i));
        await syncCloud(cloud); alert("✅ Salvato!");
    }

    function cambiaPizzeria() { localStorage.setItem('ultima_pizzeria', document.getElementById('pizzeria').value); creaLista(); }
    function valuta(i, s) {
        const v = estraiNumeroIntelligente(document.getElementById(`sel-${i}`).value);
        document.getElementById(`box-${i}`).className = `item ${isNaN(v) ? 'vuoto' : (v < s ? 'urgente' : 'ok')} ing-item`;
    }
    function azzeraLista() { if(confirm("Azzera dati?")) { localStorage.removeItem('inventario_dati_'+document.getElementById('pizzeria').value); creaLista(); } }
    function inviaWhatsApp() {
        const p = document.getElementById('pizzeria').value;
        let msg = `🏪 *INV. ${p}*\n\n`;
        ingredienti.forEach((ing, i) => {
            const input = document.getElementById(`sel-${i}`);
            if (input && input.value !== "") {
                const v = estraiNumeroIntelligente(input.value);
                const s = isWeekendDomani ? ing.we : ing.fer;
                if(v < s) msg += `• *${ing.nome}*: ${input.value}\n`;
            }
        });
        window.location.href = "whatsapp://send?text=" + encodeURIComponent(msg);
    }

    window.onload = async function() {
        const uP = localStorage.getItem('ultima_pizzeria');
        if(uP) document.getElementById('pizzeria').value = uP;
        document.getElementById('info-giorno').innerHTML = `Oggi: <b>${nomiGiorni[oraAttuale.getDay()]}</b> | Domani: <b>${nomiGiorni[domani.getDay()]}</b>`;
        await syncCloud();
    };
</script>
</body>
</html>
