<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Ordini e Rimanenze</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <style>
        :root {
            --primary: #3D1F1F; --secondary: #8d6e63; --accent: #d84315;
            --bg-body: #ffffff; --surface: #ffffff; --border: #e7e0d7;
            --text-main: #3e2723; --text-muted: #795548;
            --red-alert: #d32f2f; --green-ok: #388e3c; --warn: #FF9800;
        }

        body { font-family: "Avenir Next", "Avenir", -apple-system, sans-serif; background: var(--bg-body); color: var(--text-main); padding: 15px; margin: 0; padding-bottom: 120px; line-height: 1.4; }
        
        .header-box { background: var(--surface); padding: 20px; border-radius: 15px; margin-bottom: 25px; box-shadow: 0 4px 6px rgba(93, 64, 55, 0.05); max-width: 1200px; margin-left: auto; margin-right: auto; border: 1px solid var(--border); text-align: center; }
        #sync-status { font-size: 11px; text-transform: uppercase; letter-spacing: 1px; color: var(--secondary); margin-bottom: 10px; font-weight: bold; }
        
        select.pizzeria-select, .date-input, .search-input { width: 100%; padding: 12px; border-radius: 10px; border: 1.5px solid var(--border); font-size: 15px; background: #fff; color: var(--text-main); box-sizing: border-box; outline: none; }

        /* NUOVO LAYOUT "MASONRY" PER ELIMINARE SPAZI VUOTI */
        #contenitore-lista { 
            max-width: 1200px; margin: 0 auto;
            column-width: 350px; 
            column-gap: 15px; 
        }
        
        .categoria-header { break-inside: avoid; padding: 15px 10px 5px 5px; font-size: 14px; font-weight: 800; color: var(--primary); text-transform: uppercase; border-bottom: 2px solid var(--border); margin-top: 10px; margin-bottom: 10px; }
        .item { break-inside: avoid; background: var(--surface); padding: 16px; display: flex; justify-content: space-between; align-items: center; border: 1px solid var(--border); border-radius: 12px; margin-bottom: 8px; }
        
        .item.urgente { background: #ffebee !important; border-color: var(--red-alert) !important; }
        .item.ok { background: #f1f8e9 !important; border-color: var(--green-ok) !important; }

        input.qty-input { width: 75px; height: 40px; border-radius: 8px; border: 1px solid var(--border); font-size: 17px; font-weight: bold; text-align: center; color: var(--primary); }

        .footer-controls { position: fixed; bottom: 0; left: 0; right: 0; background: rgba(255, 255, 255, 0.95); backdrop-filter: blur(10px); padding: 15px 20px; box-shadow: 0 -5px 20px rgba(0,0,0,0.1); display: flex; gap: 15px; max-width: 1200px; margin: 0 auto; border-top: 1px solid var(--border); z-index: 1000; }
        button { cursor: pointer; border: none; border-radius: 10px; font-size: 15px; font-weight: bold; padding: 14px; }
        .btn-save { background: var(--primary); color: #fff; flex: 1; }
        .btn-wa { background: var(--green-ok); color: #fff; flex: 1.2; }
    </style>
</head>
<body>
    <header><h1 style="text-align:center;">ORDINI e RIMANENZE</h1></header>
    <div class="header-box">
        <div id="sync-status">Sincronizzazione in corso...</div>
        <select id="pizzeria" class="pizzeria-select" onchange="cambiaPizzeria()">
            <option value="CASTA">CASTA</option>
            <option value="SILEA">SILEA</option>
            <option value="BIBAN">BIBAN</option>
        </select>
    </div>
    <div id="contenitore-lista"></div>
    <div class="footer-controls" id="footer-btns">
        <button class="btn-save" onclick="eseguiSalva()">SALVA</button>
        <button class="btn-wa" onclick="inviaWhatsApp()">INVIA REPORT</button>
    </div>

<script>
    const BIN_ID = '6a032c1ec0954111d81145d6'; 
    const API_KEY = '$2a$10$n74BprduBaxkWLZ72Jok.uusA4D.MrzIci5phXRfa71Kr5fsLBJQu';
    
    // (Array ingredienti invariato)
    const ingredienti = [ /* ... il tuo array resta identico ... */ ];

    function creaLista() {
        const cont = document.getElementById('contenitore-lista');
        const p = document.getElementById('pizzeria').value;
        cont.innerHTML = "";
        
        const s = JSON.parse(localStorage.getItem('inventario_dati_'+p)) || {};
        let currentCat = "";
        
        ingredienti.forEach((ing, i) => {
            if (ing.cat !== currentCat) {
                cont.innerHTML += `<div class="categoria-header">${ing.cat}</div>`;
                currentCat = ing.cat;
            }
            const v = s[ing.nome] || "";
            cont.innerHTML += `
                <div class="item" id="box-${i}">
                    <div class="nome-container"><b>${ing.nome}</b></div>
                    <input type="text" class="qty-input" id="sel-${i}" value="${v}" onchange="valuta(${i})">
                </div>`;
        });
    }

    function valuta(i) {
        const input = document.getElementById(`sel-${i}`);
        const box = document.getElementById(`box-${i}`);
        const val = parseFloat(input.value);
        box.className = isNaN(val) ? "item" : (val < 5 ? "item urgente" : "item ok");
    }

    async function syncCloud() {
        try {
            const res = await fetch(`https://api.jsonbin.io/v3/b/${BIN_ID}/latest`, { headers: { 'X-Master-Key': API_KEY } });
            const data = await res.json();
            if(data.record) {
                Object.keys(data.record).forEach(key => localStorage.setItem(key, data.record[key]));
            }
            creaLista();
        } catch (e) { creaLista(); }
    }

    function cambiaPizzeria() { creaLista(); }
    window.onload = syncCloud;
</script>
</body>
</html>
